<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" type="image/png" href="/farma-do-bairro-logo.png">
<link rel="apple-touch-icon" href="/farma-do-bairro-logo.png"><title>Farma do Bairro — App Cliente</title><style>
:root{--bg:#f4f4f2; --card:#fff; --text:#1a1a1a; --muted:#6b7280; --line:#e5e7eb; --green:#3BAA35; --red:#dc2626; --orange:#d97706; --blue:#2563eb; --dark:#111827;}
*{box-sizing:border-box} body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:var(--bg);color:var(--text);margin:0} a{text-decoration:none;color:inherit} button,input,select,textarea{font:inherit}
.container{max-width:1180px;margin:0 auto;padding:24px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px}.logo{font-weight:800;font-size:22px;color:var(--green)}.logo small{display:block;font-size:11px;color:var(--muted);font-weight:600}.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:800}.badge.green{background:#ecfdf5;color:#15803d;border:1px solid #bbf7d0}.badge.orange{background:#fffbeb;color:#b45309;border:1px solid #fde68a}
.grid{display:grid;gap:16px}.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px}.muted{color:var(--muted)} .btn{padding:10px 14px;border-radius:10px;background:#fff;border:1px solid var(--line);font-size:13px;font-weight:700}.btn.primary{background:var(--green);border-color:var(--green);color:#fff} input,select{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:10px;background:#fff}.notice{padding:14px;border-radius:14px;background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;font-size:13px}.list-row{display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid #eee}.totais div{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9}.totais strong{font-size:15px}
@media (max-width:900px){.grid-2{grid-template-columns:1fr}}

.brand-logo-mini{display:flex;align-items:center;gap:10px}
.brand-logo-mini img{width:32px;height:32px;flex-shrink:0}
.brand-logo-mini .brand-text{display:flex;flex-direction:column}
.brand-logo-mini .brand-name{font-weight:800;font-size:18px;color:#3BAA35;line-height:1}
.brand-logo-mini .brand-tagline{font-size:11px;color:#6b7280;font-weight:600;margin-top:3px}
</style></head><body>
<script src="/public/runtime-config.js"></script>
<script src="/shared/farmaclub_boot.js"></script>
<script src="/shared/farmaclub_dados.js"></script>
<script>window.FCBoot&&window.FCBoot.setPwaLinks({ manifest: '/public/manifest-cliente.json' });</script>
<div class="container">
  <div class="topbar">
    <div class="brand-logo-mini"><img src="/farma-do-bairro-logo.png" alt="Farma do Bairro"><div class="brand-text"><span class="brand-name">App Cliente</span><span class="brand-tagline">Fluxo MVP do checkout</span></div></div>
    <div><span class="badge green">● Online</span> <span class="badge orange">1 meio por pedido</span></div>
  </div>
  <div class="notice">No MVP, o pedido aceita <strong>Pix, crédito ou débito</strong>. O sistema já separa internamente a base dos medicamentos, o frete do motoboy e a comissão do Farma do Bairro.</div>
  <div class="grid grid-2" style="margin-top:16px">
    <div class="card">
      <h3>Buscar produto</h3>
      <input id="q" placeholder="Digite o nome do produto">
      <div id="resultados" style="margin-top:12px"></div>
    </div>
    <div class="card">
      <h3>Carrinho</h3>
      <div id="cart" class="muted">Nenhum item.</div>
      <div style="margin-top:14px;display:grid;gap:10px">
        <label>Pagamento<select id="pg"><option value="pix">Pix</option><option value="credito">Crédito</option><option value="debito">Débito</option></select></label>
        <label>Frete<input id="frete" type="number" step="0.01" value="8.00"></label>
        <label>Juros do cliente<input id="juros" type="number" step="0.01" value="0.00"></label>
      </div>
      <div class="totais" id="totais" style="margin-top:14px"></div>
      <button class="btn primary" style="margin-top:12px" onclick="checkoutDemo()">Validar checkout MVP</button>
      <div id="resp" class="muted" style="margin-top:12px"></div>
    </div>
  </div>
</div>
<script>
const produtos=window.FARMADOBAIRRO.produtos||[];
const cart=[];
const fmt=v=>Number(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
function renderResults(q=''){
  const items=produtos.filter(p=>!q || p.nome.toLowerCase().includes(q.toLowerCase()));
  document.getElementById('resultados').innerHTML=items.map(p=>`<div class="list-row"><div><strong>${p.nome}</strong><div class="muted">${p.lab} · ${p.eh_medicamento?'medicamento':'não medicamento'}</div></div><button class="btn" onclick="add(${p.id})">Adicionar</button></div>`).join('') || '<div class="muted">Nenhum resultado.</div>';
}
function recalc(){
  if(!cart.length){
    document.getElementById('cart').innerHTML='Nenhum item.';
    document.getElementById('totais').innerHTML='';
    return;
  }
  document.getElementById('cart').innerHTML=cart.map((i,idx)=>`<div class="list-row"><div>${i.nome}<div class="muted">${i.eh_medicamento?'entra na comissão':'fora da comissão'}</div></div><div>${fmt(i.preco_ref)} <button class="btn" onclick="removeItem(${idx})">x</button></div></div>`).join('');
  const med=cart.filter(i=>i.eh_medicamento).reduce((s,i)=>s+i.preco_ref,0);
  const outros=cart.filter(i=>!i.eh_medicamento).reduce((s,i)=>s+i.preco_ref,0);
  const frete=Number(document.getElementById('frete').value||0);
  const juros=Number(document.getElementById('juros').value||0);
  const taxaFC=+(med*0.10).toFixed(2);
  const total=+(med+outros+frete+juros).toFixed(2);
  document.getElementById('totais').innerHTML=[
    ['Medicamentos',fmt(med)],
    ['Outros itens',fmt(outros)],
    ['Frete',fmt(frete)],
    ['Juros do cliente',fmt(juros)],
    ['Comissão Farma do Bairro',fmt(taxaFC)],
    ['Total do cliente',fmt(total)]
  ].map(([a,b])=>`<div><span>${a}</span><strong>${b}</strong></div>`).join('');
}
function add(id){ const p=produtos.find(x=>x.id===id); if(!p) return; cart.push(p); recalc(); }
function removeItem(idx){ cart.splice(idx,1); recalc(); }
async function checkoutDemo(){
  if(!cart.length){ document.getElementById('resp').textContent='Adicione itens ao carrinho.'; return; }
  const payload={
    itens: cart.map(i=>({ id:i.id, nome:i.nome, qtd:1, preco:i.preco_ref, eh_medicamento:i.eh_medicamento })),
    frete: Number(document.getElementById('frete').value||0),
    juros_parcelamento: Number(document.getElementById('juros').value||0),
    pagamentos:[{ metodo: document.getElementById('pg').value, valor: 0 }]
  };
  try {
    const r = await fetch('/api/checkout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const data = await r.json();
    if(!r.ok) throw new Error(data.error || 'Erro no checkout');
    document.getElementById('resp').innerHTML=`Checkout válido. Farma do Bairro: <strong>${fmt(data.split.farmaclub_fee)}</strong> · Motoboy: <strong>${fmt(data.split.motoboy_fee)}</strong> · Farmácia líquida: <strong>${fmt(data.split.net_farmacia)}</strong>`;
  } catch (e) {
    document.getElementById('resp').textContent = e.message;
  }
}
document.getElementById('q').addEventListener('input', e=>renderResults(e.target.value));
document.getElementById('frete').addEventListener('input', recalc);
document.getElementById('juros').addEventListener('input', recalc);
renderResults();
</script>
</body></html>
