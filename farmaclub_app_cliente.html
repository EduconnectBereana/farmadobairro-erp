let usuarioLogado = JSON.parse(localStorage.getItem("fc_user_logado")||"null");

function getUsuarios(){return JSON.parse(localStorage.getItem("fc_usuarios")||"{}");}
function setUsuarios(u){localStorage.setItem("fc_usuarios",JSON.stringify(u));}

function login(email,senha){
  const u=getUsuarios()[email.toLowerCase()];
  if(!u) return {ok:false,msg:"E-mail não encontrado. Crie sua conta."};
  if(u.senha!==btoa(senha)) return {ok:false,msg:"Senha incorreta. Tente novamente."};
  usuarioLogado={nome:u.nome,email:u.email,tel:u.tel};
  localStorage.setItem("fc_user_logado",JSON.stringify(usuarioLogado));
  return {ok:true};
}

function cadastrar(nome,email,tel,senha){
  if(!nome||!email||!senha) return {ok:false,msg:"Preencha todos os campos obrigatórios."};
  if(senha.length<6) return {ok:false,msg:"Senha precisa ter pelo menos 6 caracteres."};
  const us=getUsuarios();
  if(us[email.toLowerCase()]) return {ok:false,msg:"E-mail já cadastrado. Faça login."};
  us[email.toLowerCase()]={nome,email:email.toLowerCase(),tel,senha:btoa(senha)};
  setUsuarios(us);
  usuarioLogado={nome,email:email.toLowerCase(),tel};
  localStorage.setItem("fc_user_logado",JSON.stringify(usuarioLogado));
  return {ok:true};
}

function logout(){
  usuarioLogado=null;
  localStorage.removeItem("fc_user_logado");
  atualizarTopUser();
  navTo("inicio");

    ico.textContent="✅";

    ico.textContent="👤";
  }
}

function tgSenha(id,btn){const el=document.getElementById(id);if(!el)return;el.type=el.type==="password"?"text":"password";btn.textContent=el.type==="password"?"👁":"🙈";}
function showAuthMsg(msg,ok){const el=document.getElementById("auth-msg");if(!el)return;el.textContent=msg;el.style.display="block";el.style.background=ok?"#f0fdf4":"#fef2f2";el.style.color=ok?"#16a34a":"#dc2626";el.style.border=`1px solid ${ok?"#bbf7d0":"#fecaca"}`;}
window.avCd=function(el,i){if(el.value.length===1&&i<5)document.getElementById("cd-"+(i+1))?.focus();};
window.vlCd=function(e,i){if(e.key==="Backspace"&&!e.target.value&&i>0)document.getElementById("cd-"+(i-1))?.focus();};
function getCd(){return [0,1,2,3,4,5].map(i=>document.getElementById("cd-"+i)?.value||"").join("");}

function doLogin(){

  const r=login(em,pw);
  if(r.ok){fecharAuth();atualizarTopUser();if(authCallback)authCallback();else navTo("checkout");}
  else showAuthMsg(r.msg);
}

function doEnviarCodigo(){
  const em=(document.getElementById("r-em")?.value.trim()||resetEmail).toLowerCase();
  if(!em){showAuthMsg("Digite seu e-mail.");return;}
  const us=getUsuarios();
  if(!us[em]){showAuthMsg("E-mail não encontrado.");return;}
  resetEmail=em;
  const cod=String(Math.floor(100000+Math.random()*900000));
  localStorage.setItem("fc_rst_"+em,JSON.stringify({cod,ts:Date.now()}));
  authTela="codigo";renderAuth();
  setTimeout(()=>showAuthMsg("Código de demonstração: "+cod+" (em produção chega no WhatsApp)",true),200);
}

function doVerificarCodigo(){
  const cd=getCd();
  if(cd.length!==6){showAuthMsg("Digite os 6 dígitos.");return;}
  const data=JSON.parse(localStorage.getItem("fc_rst_"+resetEmail)||"null");
  if(!data||Date.now()-data.ts>10*60*1000||data.cod!==cd){showAuthMsg("Código incorreto ou expirado.");return;}
  authTela="nova";renderAuth();
}
window.doVerificarCodigo=doVerificarCodigo;

function doNovaSenha(){
  const pw=document.getElementById("ns-pw")?.value;
  const cf=document.getElementById("ns-cf")?.value;
  if(!pw||pw.length<6){showAuthMsg("Mínimo 6 caracteres.");return;}
  if(pw!==cf){showAuthMsg("Senhas não coincidem.");return;}
  const us=getUsuarios();
  if(!us[resetEmail]){showAuthMsg("Erro. Tente novamente.");return;}
  us[resetEmail].senha=btoa(pw);
  setUsuarios(us);
  localStorage.removeItem("fc_rst_"+resetEmail);
  showAuthMsg("Senha alterada! Faça login.",true);
  setTimeout(()=>{authTela="login";renderAuth();},1500);
}

function addCart(pid,fid){
  const p=catalogo.find(x=>x.id===pid),f=farms.find(x=>x.id===fid);
  if(!p||!f||(p.est[fid]||0)===0)return;
  const ex=carrinho.find(x=>x.pid===pid&&x.fid===fid);
  if(ex)ex.qtd++;else carrinho.push({pid,fid,nome:p.nome,farm:f.nome,farmLat:f.lat,farmLng:f.lng,preco:p.preco,qtd:1,ico:p.ico,receita:p.receita});
  updBadge();toast(p.ico+" Adicionado ao carrinho!");

function remCart(pid,fid){
  const i=carrinho.findIndex(x=>x.pid===pid&&x.fid===fid);
  if(i<0)return;
  if(carrinho[i].qtd>1)carrinho[i].qtd--;else carrinho.splice(i,1);
  updBadge();rc();
}
function updBadge(){
  const n=carrinho.reduce((s,i)=>s+i.qtd,0);
  document.getElementById("cnt").textContent=n;
  const b=document.getElementById("cbadge");b.textContent=n;b.style.display=n>0?"flex":"none";
}
function totalBase(){return carrinho.reduce((s,i)=>s+i.preco*i.qtd,0);}
function totalComPag(tipo){return +(totalBase()*(PAGAMENTO[tipo]?.mult||1)).toFixed(2);}

function toast(msg){
  let t=document.getElementById("_toast");
  if(!t){t=document.createElement("div");t.id="_toast";t.style.cssText="position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 18px;border-radius:20px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none";document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity=1;clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity=0,2200);
}

function getCampanhasAtivas(){
  const hoje = new Date();
  return JSON.parse(localStorage.getItem("fc_campanhas")||"[]")
    .filter(c=>c.ativa && new Date(c.dataFim)>=hoje);
}

function tagCampanha(nomeProd){
  const camps = getCampanhasAtivas();
  const camp = camps.find(c=>c.produto===nomeProd||(c.itens&&c.itens.includes(nomeProd)));
  if(!camp) return "";
  if(camp.tipo==="novidade") return `<div class="tag-novidade">🟠 NOVIDADE</div>`;
  if(camp.tipo==="progressivo") return `<div class="tag-prog">📦 Leve ${camp.qtdMin}, ${camp.desconto}% off</div>`;
  if(camp.tipo==="kit") return `<div class="tag-kit">🎁 KIT ESPECIAL</div>`;
  return "";
}

function farmMaisProxima(){
  return farms.filter(f=>f.aberto).sort((a,b)=>a.id-b.id)[0]||farms[0];
}

function farmFechandoBreve(f){
  if(!f||!f.horario) return false;
  const m=f.horario.match(/(\d+)h/g);
  if(!m||m.length<2) return false;
  const fechaH=parseInt(m[m.length-1]);
  const agora=new Date();
  const minRestantes=fechaH*60-(agora.getHours()*60+agora.getMinutes());
  return minRestantes>=0&&minRestantes<=10;
}

// Histórico de buscas recentes
function getBuscasRecentes(){return JSON.parse(localStorage.getItem("fc_buscas_rec")||"[]");}
function addBuscaRecente(txt){
  if(!txt||txt.length<2)return;
  let rec=getBuscasRecentes().filter(x=>x!==txt).slice(0,4);
  rec.unshift(txt);
  localStorage.setItem("fc_buscas_rec",JSON.stringify(rec));
}

function highlightMatch(txt, q){
  if(!q) return txt;
  const i=txt.toLowerCase().indexOf(q.toLowerCase());
  if(i<0) return txt;
  return txt.slice(0,i)+'<strong style="color:#3BAA35">'+txt.slice(i,i+q.length)+'</strong>'+txt.slice(i+q.length);
}

// Renderizar autocomplete sem re-renderizar a página toda
window.renderBuscaAC = function(){
  const q = document.getElementById("busca-inp")?.value||"";
  buscaTxt = q;
  const drop = document.getElementById("ac-drop");
  if(!drop) return;

  // Sem query suficiente
  if(q.length < 2){ drop.style.display="none"; return; }

  const sugs = catalogo.filter(p=>
    p.nome.toLowerCase().includes(q.toLowerCase())||
    p.lab.toLowerCase().includes(q.toLowerCase())||
    p.ean.includes(q)
  ).slice(0,7);

  if(!sugs.length){ drop.style.display="none"; return; }

  const camps = getCampanhasAtivas();
  drop.innerHTML = sugs.map(p=>{
    const camp = camps.find(c=>c.produto===p.nome);
    const disp = farms.filter(f=>(p.est[f.id]||0)>0).length;
    return`<div class="ac-item ${camp?"ac-destaque":""}" onclick="prodAtivoId=${p.id};addBuscaRecente('${q}');document.getElementById('ac-drop').style.display='none';tela='produto';buscaTxt='';rc()">
      <div class="ac-ico">${p.ico}</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600">${highlightMatch(p.nome,q)}</div>
        <div style="font-size:11px;color:#9a9eb8">${p.lab} · ${disp>0?`<span style="color:#3BAA35">${disp} farmácia(s)</span>`:'<span style="color:#E03A3A">Sem estoque</span>'}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:13px;font-weight:700;color:#3BAA35">${fmt(p.preco)}</div>
        ${camp?`<div style="font-size:9px;color:#E8650A;font-weight:700">${camp.tipo==="novidade"?"🟠 NOVO":camp.tipo==="kit"?"🎁 KIT":"📦 PROMO"}</div>`:""}
      </div>
    </div>`;
  }).join("");

  // Item "ver todos os resultados"
  drop.innerHTML += `<div class="ac-item" style="background:#f8f8f8;justify-content:center"
    onclick="addBuscaRecente('${q}');document.getElementById('ac-drop').style.display='none';rc()">
    <span style="font-size:12px;font-weight:600;color:#3BAA35">🔍 Ver todos os resultados para "${q}"</span>
  </div>`;

  drop.style.display = "block";
};

// PIX — QR Code + copia e cola
function rPix(total){
  const chave="11.111.111/0001-11"; // CNPJ FarmaClub
  const txId="FARMACLUB"+Date.now().toString().slice(-8);
  // Payload PIX simplificado (simulado — em produção usa API de pagamento)
  const payload=`00020126580014BR.GOV.BCB.PIX0136${chave}520400005303986540${total.toFixed(2).replace(".","").padStart(7,"0")}5802BR5913FarmaClub6009Itaperuna62070503***6304`;
  const copiaECola=`00020126580014BR.GOV.BCB.PIX0136${chave}52040000530398654${total.toFixed(2).replace(".","").padStart(7,"0")}5802BR5913FarmaClub6009Itaperuna62070503***6304ABCD`;

  return`
    <div style="background:#fff;padding:12px 16px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px;position:sticky;top:52px;z-index:90">
      <button onclick="tela='checkout';rc()" style="background:transparent;color:#5a5e7a;font-size:20px;padding:0">←</button>
      <div style="font-weight:600">Pagamento via PIX</div>
    </div>

    <div style="padding:16px 12px 0">
      <div class="pix-box">
        <div style="font-size:14px;font-weight:700;color:#16a34a;margin-bottom:4px">📱 Pague com PIX</div>
        <div style="font-size:28px;font-weight:800;color:#16a34a;margin-bottom:4px">${fmt(total)}</div>
        <div style="font-size:12px;color:#16a34a;opacity:.8;margin-bottom:16px">Melhor preço · Aprovação instantânea</div>

        <!-- QR CODE SVG SIMULADO -->
        <div class="qr-wrap">
          <svg width="200" height="200" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
            <rect width="21" height="21" fill="white"/>
            <!-- Padrão QR simulado -->
            ${[...Array(21)].map((_,r)=>[...Array(21)].map((_,c)=>{
              const isCorner=(r<7&&c<7)||(r<7&&c>13)||(r>13&&c<7);
              const isInnerCorner=(r>=1&&r<=5&&c>=1&&c<=5)||(r>=1&&r<=5&&c>=15&&c<=19)||(r>=15&&r<=19&&c>=1&&c<=5);
              const isCenterDot=(r===3&&c===3)||(r===3&&c===17)||(r===17&&c===3);
              const isRand=((r*17+c*13)%7<3)&&!isCorner;
              const fill=isInnerCorner||isCenterDot||(isCorner&&!isInnerCorner)||isRand?"#000":"none";
              return fill!=="none"?`<rect x="${c}" y="${r}" width="1" height="1" fill="${fill}"/>`:"";
            }).join("")).join("")}
          </svg>
        </div>

        <div style="font-size:12px;color:#16a34a;margin-bottom:12px;font-weight:500">Aponte a câmera do seu banco para o QR Code</div>

        <!-- COPIA E COLA -->
        <div style="background:#fff;border-radius:10px;padding:10px;margin-bottom:12px;text-align:left;border:1px solid #bbf7d0">
          <div style="font-size:11px;color:#9a9eb8;margin-bottom:4px;font-weight:600">CÓDIGO PIX — COPIA E COLA</div>
          <div style="font-size:10px;color:#1a1a2e;word-break:break-all;line-height:1.5;font-family:monospace">${copiaECola.substring(0,60)}...</div>
        </div>

        <button class="pix-copy" id="btn-copiar" onclick="copiarPix('${copiaECola}')">
          <span>📋</span> Copiar código PIX
        </button>

        <div style="margin-top:12px;font-size:11px;color:#16a34a;opacity:.8;line-height:1.6">
          Válido por <strong>30 minutos</strong> · Após o pagamento, confirme abaixo
        </div>
      </div>

      <div style="margin:12px 0;text-align:center;font-size:13px;color:#9a9eb8">Já pagou? Confirme para acompanhar sua entrega</div>

      <button onclick="confirmarPagamentoPix()" style="width:100%;padding:14px;background:#3BAA35;color:#fff;border-radius:12px;font-size:15px;font-weight:700;border:none;cursor:pointer">
        ✅ Já paguei — confirmar pedido
      </button>
      <button onclick="tela='checkout';rc()" style="width:100%;padding:11px;background:transparent;border:1.5px solid #e0e0e0;color:#9a9eb8;border-radius:10px;font-size:13px;font-weight:600;margin-top:8px;cursor:pointer">
        Voltar e trocar pagamento
      </button>
    </div>`;
}

window.copiarPix=function(texto){
  navigator.clipboard?.writeText(texto).then(()=>{
    const btn=document.getElementById("btn-copiar");
    if(btn){btn.innerHTML='<span>✅</span> Copiado!';btn.className="pix-copy copiado";}
    toast("✅ Código PIX copiado!");
    setTimeout(()=>{if(btn){btn.innerHTML='<span>📋</span> Copiar código PIX';btn.className="pix-copy";}},3000);
  }).catch(()=>toast("Use o botão longo no código acima"));
};

function confirmarPedido(nm,tel,end,bairro){
  const base=totalBase(),frete=calcFrete(base);
  const total=+(totalComPag(pagSel)+frete).toFixed(2);
  const fid=carrinho[0]?.fid;
  const f=farms.find(x=>x.id===fid);
  const ped={
    id:"#"+String(Date.now()).slice(-4),
    cliente:nm||usuarioLogado?.nome||"Cliente",
    tel:tel||usuarioLogado?.tel||"",
    email:usuarioLogado?.email||"",
    endereco:(end||"Endereço não informado")+(bairro?" — "+bairro:"")+" — Itaperuna/RJ",
    clienteLat:-21.2100+(Math.random()-.5)*.015,
    clienteLng:-41.8900+(Math.random()-.5)*.015,
    itens:[...carrinho],
    totalBase:base,
    total,frete,
    pagamento:PAGAMENTO[pagSel]?.label||"PIX",
    pagSel,
    status:"aguardando",
    farmacia:f?f.nome:"FarmaClub",
    farmId:fid,
    farmLat:f?.lat||(-21.2062),
    farmLng:f?.lng||(-41.8878),
    motoboyLat:f?.lat||(-21.2062),
    motoboyLng:f?.lng||(-41.8878),
    motoboy:null,
    confirmadoCliente:false,
    bairro,
    data:new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}),
    ts:Date.now()
  };
  // Ajuste para retirada (sem frete)
  if(modoEntrega==="retirada"){ped.frete=0;ped.total=totalComPag(pagSel);ped.modoEntrega="retirada";}
  const peds=getPedidos();peds.push(ped);salvarPedidos(peds);
  // Notificar motoboys ordenados por distância (só se entrega em casa)
  if(modoEntrega==="entrega") notificarMotoboysPorDistancia(ped);
  pedidoAtual=ped;carrinho=[];updBadge();
  tela="rastreamento";rc();
  toast("🎉 Pedido realizado com sucesso!");
}

function simularMovimento(ped){
  if(simTimer)clearInterval(simTimer);
  let p=0,tot=30;
  const dLat=(ped.clienteLat-ped.farmLat)/tot,dLng=(ped.clienteLng-ped.farmLng)/tot;
  let lat=ped.motoboyLat||ped.farmLat,lng=ped.motoboyLng||ped.farmLng;
  simTimer=setInterval(()=>{
    p++;lat+=dLat+(Math.random()-.5)*.0002;lng+=dLng+(Math.random()-.5)*.0002;
    if(marcadorMotoboy)marcadorMotoboy.setLatLng([lat,lng]);
    const peds=getPedidos(),i=peds.findIndex(x=>x.id===ped.id);
    if(i>=0){peds[i].motoboyLat=lat;peds[i].motoboyLng=lng;salvarPedidos(peds);}
    if(p>=tot){clearInterval(simTimer);simTimer=null;}
  },2000);
}

window.comprarDeNovo = function(pedId){
  const ped = getPedidos().find(p=>p.id===pedId);
  if(!ped) return;
  let adicionados=0, semEstoque=[];
  ped.itens.forEach(it=>{
    const p=catalogo.find(x=>x.pid===it.pid||x.id===it.pid);
    const fid=it.fid;
    if(p&&(p.est[fid]||0)>0){
      const ex=carrinho.find(x=>x.pid===it.pid&&x.fid===fid);
      if(ex) ex.qtd+=it.qtd;
      else carrinho.push({...it,qtd:it.qtd});
      adicionados++;
    } else {
      semEstoque.push(it.nome?.split(" ").slice(0,3).join(" ")||"Item");
    }
  });
  updBadge();
  if(adicionados>0&&semEstoque.length===0){
    toast("✅ "+adicionados+" produto(s) adicionados ao carrinho!");
    navTo("carrinho");
  } else if(adicionados>0){

    navTo("carrinho");
  } else {

  }
};

function farmaciaDoCarrinho(){

function farmFechandoBreve(f){
  if(!f||!f.horario) return false;
  const m=f.horario.match(/(\d+)h/g);
  if(!m||m.length<2) return false;
  const fechaH=parseInt(m[m.length-1]);
  const agora=new Date();
  const minRestantes=fechaH*60-(agora.getHours()*60+agora.getMinutes());
  return minRestantes>=0&&minRestantes<=10;
}

// ── ALARME MOTOBOYS POR DISTÂNCIA ──
function calcDistancia(lat1,lng1,lat2,lng2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)*Math.sin(dLat/2)+
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function notificarMotoboysPorDistancia(pedido){
  // Em produção: API push notification ordenada por distância
  // Aqui: salva no localStorage com timestamp para o app motoboy ler
  const farmLat = pedido.farmLat||(-21.2062);
  const farmLng = pedido.farmLng||(-41.8878);

  // Motoboys simulados com posição aproximada
  const motoboys = [
    {id:1,nome:"Carlos Mendes",lat:-21.2050,lng:-41.8870},
    {id:2,nome:"Rafael Silva",lat:-21.2100,lng:-41.8920},
    {id:3,nome:"André Costa",lat:-21.1980,lng:-41.8800},
  ];

  const ordenados = motoboys
    .map(m=>({...m,dist:calcDistancia(farmLat,farmLng,m.lat,m.lng)}))
    .sort((a,b)=>a.dist-b.dist);

  // Salvar alerta com ordem de prioridade
  const alertas = JSON.parse(localStorage.getItem("fc_alertas_motoboy")||"[]");
  alertas.push({
    pedidoId: pedido.id,
    farmacia: pedido.farmacia,
    endereco: pedido.endereco,
    total: pedido.total,
    motoboysFila: ordenados.map(m=>({id:m.id,nome:m.nome,dist:+(m.dist*1000).toFixed(0)})),
    ts: Date.now(),
    status: "aguardando"
  });
  localStorage.setItem("fc_alertas_motoboy", JSON.stringify(alertas));
}

const DIAS_SEMANA = {seg:"Seg",ter:"Ter",qua:"Qua",qui:"Qui",sex:"Sex",sab:"Sáb",dom:"Dom"};

let medicoAtivoId = null;
let agendSlot = null; // {dia, hora}

function getMedicos(){ return medicosDB.filter(m=>m.ativo); }
function getMedico(id){ return medicosDB.find(m=>m.id===id); }

    <div style="background:#fff;padding:12px 16px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px;position:sticky;top:52px;z-index:90">
      <button onclick="navTo('inicio')" style="background:transparent;color:#5a5e7a;font-size:20px;padding:0">←</button>
      <div>
        <div style="font-weight:700;font-size:15px">Consultas Médicas</div>
        <div style="font-size:11px;color:#9a9eb8">${meds.length} médicos disponíveis em Itaperuna</div>
      </div>
    </div>

    <div style="background:linear-gradient(135deg,#1A5FA8,#0d47a1);padding:16px;color:#fff;text-align:center">
      <div style="font-size:14px;font-weight:600;margin-bottom:4px">Agende sua consulta presencial</div>

    <!-- FILTRO POR ESPECIALIDADE -->

      ${["Todas",...especialidades].map(e=>`
        <button onclick="catAtiva='${e}';rc()"
          style="padding:6px 14px;border-radius:20px;border:1.5px solid ${catAtiva===e||(!catAtiva&&e==="Todas")?"#1A5FA8":"#e0e0e0"};background:${catAtiva===e||(!catAtiva&&e==="Todas")?"#1A5FA8":"#fff"};color:${catAtiva===e||(!catAtiva&&e==="Todas")?"#fff":"#555"};font-size:12px;font-weight:600;white-space:nowrap;flex-shrink:0;cursor:pointer;font-family:inherit">

    <!-- CARDS DE MÉDICOS -->
    <div style="padding:8px 0">
      ${meds.filter(m=>!catAtiva||catAtiva==="Todas"||m.especialidade===catAtiva).map(m=>`
        <div onclick="medicoAtivoId=${m.id};tela='medico_perfil';rc()"

          <div style="width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#eff6ff,#dbeafe);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0">${m.foto}</div>

            <div style="font-size:12px;color:#1A5FA8;font-weight:600;margin-top:2px">${m.especialidade}</div>
            <div style="font-size:11px;color:#9a9eb8;margin-top:2px">${m.crm}</div>
            <div style="display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap">
              <span style="color:#d97706;font-size:12px">★ ${m.nota}</span>
              <span style="font-size:11px;color:#9a9eb8">${m.consultas} consultas</span>
              <span style="font-size:12px;font-weight:700;color:#1A5FA8">${fmt(m.valor)}</span>
            </div>
            <div style="font-size:11px;color:#9a9eb8;margin-top:4px">📍 ${m.endereco.split("—")[0].trim()}</div>
          </div>
          <div style="color:#9a9eb8;font-size:20px;align-self:center">›</div>
        </div>`).join("")}
    </div>

    <div style="padding:16px;background:#f0fdf4;margin:0 12px 16px;border-radius:12px;border:1px solid #bbf7d0">
      <div style="font-size:12px;font-weight:700;color:#16a34a;margin-bottom:6px">💊 Vantagem FarmaClub</div>
      <div style="font-size:12px;color:#166534;line-height:1.6">
        Após sua consulta, o médico pode indicar os medicamentos. Compre aqui com praticidade e seu médico recebe uma bonificação por cada compra.
      </div>
    </div>`;
}

function rMedicoPerfil(){
  const m = getMedico(medicoAtivoId);
  if(!m) return rMedicos();

  const hoje = new Date();
  const diasSemana = ["dom","seg","ter","qua","qui","sex","sab"];

  // Próximos 7 dias úteis
  const proxDias = [];
  for(let i=1;i<=14&&proxDias.length<7;i++){
    const d = new Date(hoje);
    d.setDate(hoje.getDate()+i);
    const dKey = diasSemana[d.getDay()];
    if(m.horarios[dKey]&&m.horarios[dKey].length>0){
      proxDias.push({
        key: dKey,
        data: d,
        label: d.toLocaleDateString("pt-BR",{weekday:"short",day:"numeric",month:"short"}),
        horas: m.horarios[dKey]
      });
    }
  }

  return`
    <div style="background:#fff;padding:12px 16px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px;position:sticky;top:52px;z-index:90">
      <button onclick="tela='medicos';rc()" style="background:transparent;color:#5a5e7a;font-size:20px;padding:0">←</button>
      <div style="font-weight:600;font-size:14px">${m.nome.split(" ")[0]} ${m.nome.split(" ")[1]}</div>
    </div>

    <!-- PERFIL -->
    <div style="background:linear-gradient(135deg,#eff6ff,#fff);padding:20px;text-align:center;border-bottom:1px solid #f0f0f0">
      <div style="font-size:52px;margin-bottom:8px">${m.foto}</div>
      <div style="font-size:18px;font-weight:800;color:#1a1a2e;margin-bottom:2px">${m.nome}</div>
      <div style="font-size:14px;font-weight:600;color:#1A5FA8;margin-bottom:4px">${m.especialidade} · ${m.subespecialidade}</div>
      <div style="font-size:12px;color:#9a9eb8;margin-bottom:10px">${m.crm}</div>
      <div style="display:flex;justify-content:center;gap:16px;margin-bottom:12px">
        <div style="text-align:center"><div style="font-size:18px;font-weight:700;color:#1a1a2e">${m.nota}</div><div style="font-size:10px;color:#9a9eb8">Avaliação</div></div>
        <div style="width:1px;background:#e8eaf4"></div>
        <div style="text-align:center"><div style="font-size:18px;font-weight:700;color:#1a1a2e">${m.consultas}</div><div style="font-size:10px;color:#9a9eb8">Consultas</div></div>
        <div style="width:1px;background:#e8eaf4"></div>
        <div style="text-align:center"><div style="font-size:18px;font-weight:700;color:#1A5FA8">${fmt(m.valor)}</div><div style="font-size:10px;color:#9a9eb8">Consulta</div></div>
      </div>
      <div style="font-size:12px;color:#555;line-height:1.6;max-width:320px;margin:0 auto">${m.bio}</div>
    </div>

    <!-- ENDEREÇO -->
    <div style="background:#fff;padding:14px 16px;border-bottom:1px solid #f0f0f0">
      <div style="font-size:12px;font-weight:700;color:#9a9eb8;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">📍 Localização</div>
      <div style="font-size:13px;color:#1a1a2e">${m.endereco}</div>
      <div style="font-size:12px;color:#9a9eb8;margin-top:4px">📞 ${m.tel}</div>
    </div>

    <!-- HORÁRIOS DISPONÍVEIS -->
    <div style="background:#fff;padding:14px 16px;border-bottom:1px solid #f0f0f0">
      <div style="font-size:12px;font-weight:700;color:#9a9eb8;text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px">📅 Horários disponíveis</div>
      ${proxDias.length===0?`<div style="color:#9a9eb8;font-size:13px">Nenhum horário disponível nos próximos dias.</div>`
      :proxDias.map(dia=>`
        <div style="margin-bottom:12px">
          <div style="font-size:12px;font-weight:600;color:#1a1a2e;margin-bottom:6px;text-transform:capitalize">${dia.label}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${dia.horas.map(h=>`
              <button onclick="agendSlot={dia:'${dia.label}',hora:'${h}:00',data:'${dia.data.toLocaleDateString("pt-BR")}',medicoId:${m.id}};tela='agendamento';rc()"
                style="padding:7px 14px;border-radius:8px;border:1.5px solid #1A5FA8;background:#fff;color:#1A5FA8;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s"
                onmouseover="this.style.background='#1A5FA8';this.style.color='#fff'"
                onmouseout="this.style.background='#fff';this.style.color='#1A5FA8'">
                ${h}:00
              </button>`).join("")}
          </div>
        </div>`).join("")}
    </div>

    <div style="padding:16px">
      <button onclick="agendSlot={dia:'Próxima disponível',hora:'A combinar',data:'',medicoId:${m.id}};tela='agendamento';rc()"
        style="width:100%;padding:14px;background:#1A5FA8;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">
        Agendar consulta — ${fmt(m.valor)}
      </button>
    </div>`;
}

function rAgendamento(){
  if(!agendSlot) return rMedicos();
  const m = getMedico(agendSlot.medicoId);
  if(!m) return rMedicos();
  const taxaPlat = +(m.valor*COMISSAO_FARMACLUB_CONSULTA).toFixed(2);
  const medicoRecebe = +(m.valor-taxaPlat).toFixed(2);

  return`
    <div style="background:#fff;padding:12px 16px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px;position:sticky;top:52px;z-index:90">
      <button onclick="tela='medico_perfil';rc()" style="background:transparent;color:#5a5e7a;font-size:20px;padding:0">←</button>
      <div style="font-weight:600">Confirmar agendamento</div>
    </div>

    <!-- RESUMO -->
    <div style="background:linear-gradient(135deg,#1A5FA8,#0d47a1);padding:18px;color:#fff">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="font-size:36px">${m.foto}</div>
        <div>
          <div style="font-size:15px;font-weight:700">${m.nome}</div>
          <div style="font-size:12px;opacity:.85">${m.especialidade}</div>
          <div style="font-size:13px;font-weight:700;margin-top:4px">📅 ${agendSlot.dia} às ${agendSlot.hora}</div>
          ${agendSlot.data?`<div style="font-size:11px;opacity:.8">${agendSlot.data}</div>`:""}
        </div>
      </div>
    </div>

    <!-- DADOS DO PACIENTE -->
    <div style="background:#fff;padding:14px 16px;border-bottom:1px solid #f0f0f0">
      <div style="font-size:13px;font-weight:600;margin-bottom:12px">👤 Seus dados</div>
      <div style="display:grid;gap:8px">
        <div><label style="font-size:11px;color:#9a9eb8;display:block;margin-bottom:3px">Nome completo</label>
          <input type="text" id="ag-nome" value="${usuarioLogado?.nome||""}" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:13px"></div>
        <div><label style="font-size:11px;color:#9a9eb8;display:block;margin-bottom:3px">WhatsApp</label>
          <input type="tel" id="ag-tel" value="${usuarioLogado?.tel||""}" placeholder="(22) 99999-9999" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:13px"></div>
        <div><label style="font-size:11px;color:#9a9eb8;display:block;margin-bottom:3px">Motivo da consulta (opcional)</label>
          <input type="text" id="ag-motivo" placeholder="Ex: dor de cabeça frequente, pressão alta..." style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:13px"></div>
      </div>
    </div>

    <!-- PAGAMENTO -->
    <div style="background:#fff;padding:14px 16px;border-bottom:1px solid #f0f0f0">
      <div style="font-size:13px;font-weight:600;margin-bottom:12px">💳 Pagamento da consulta</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${["📱 PIX","💵 Dinheiro","💳 Débito","💳 Crédito"].map(f=>`
          <button onclick="pagSel='${f}';rc()" style="padding:10px;border:1.5px solid ${pagSel===f?"#1A5FA8":"#e0e0e0"};border-radius:8px;background:${pagSel===f?"#eff6ff":"#fff"};font-size:12px;font-weight:600;color:${pagSel===f?"#1A5FA8":"#5a5e7a"};cursor:pointer;font-family:inherit">${f}</button>`).join("")}
      </div>
    </div>

    <!-- RESUMO FINANCEIRO -->
    <div style="background:#f8f8f8;padding:14px 16px;border-bottom:1px solid #f0f0f0">
      <div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid #eee"><span>Valor da consulta</span><span style="font-weight:600">${fmt(m.valor)}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0">
        <span style="color:#9a9eb8">Taxa de plataforma FarmaClub (10%)</span>
        <span style="color:#9a9eb8">${fmt(taxaPlat)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-top:1px solid #eee">
        <span style="color:#9a9eb8">Médico recebe</span>
        <span style="color:#9a9eb8">${fmt(medicoRecebe)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:16px;font-weight:700;padding-top:8px"><span>Total</span><span style="color:#1A5FA8">${fmt(m.valor)}</span></div>
    </div>

    <div style="background:#f0fdf4;border:1px solid #bbf7d0;margin:12px;border-radius:10px;padding:12px;font-size:12px;color:#166534;line-height:1.6">
      💊 <strong>Dica:</strong> Após a consulta, os medicamentos prescritos podem ser comprados aqui no FarmaClub. Seu médico recebe 3% do valor como bonificação.
    </div>

    <div style="padding:0 12px 20px">
      <button onclick="confirmarAgendamento()" style="width:100%;padding:14px;background:#1A5FA8;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">
        ✅ Confirmar agendamento — ${fmt(m.valor)}
      </button>
    </div>`;
}

window.confirmarAgendamento = function(){
  if(!usuarioLogado){ abrirAuth("login",()=>{tela="agendamento";rc();}); return; }
  const nome=document.getElementById("ag-nome")?.value.trim();
  const tel=document.getElementById("ag-tel")?.value.trim();
  if(!nome||!tel){ alert("Preencha seu nome e WhatsApp."); return; }
  const m=getMedico(agendSlot?.medicoId);
  if(!m) return;

  const agend={
    id:"AG"+String(Date.now()).slice(-6),
    medicoId:m.id, medico:m.nome, especialidade:m.especialidade,
    paciente:nome, tel, email:usuarioLogado.email,
    dia:agendSlot.dia, hora:agendSlot.hora, data:agendSlot.data,
    valor:m.valor, status:"confirmado",
    pagamento:pagSel||"PIX",
    criadoEm:new Date().toISOString()
  };

  const ags=JSON.parse(localStorage.getItem("fc_agendamentos")||"[]");
  ags.push(agend);
  localStorage.setItem("fc_agendamentos",JSON.stringify(ags));

  toast("✅ Consulta agendada! Você receberá confirmação no WhatsApp.");

  // Exibir confirmação
  document.getElementById("content").innerHTML=`
    <div style="text-align:center;padding:40px 20px">
      <div style="font-size:52px;margin-bottom:16px">🗓️</div>
      <div style="font-size:20px;font-weight:800;color:#1A5FA8;margin-bottom:8px">Consulta agendada!</div>
      <div style="font-size:14px;color:#555;line-height:1.7;margin-bottom:20px">
        <strong>${m.nome}</strong><br>
        📅 ${agendSlot.dia} às ${agendSlot.hora}<br>
        📍 ${m.endereco.split("—")[0].trim()}<br>
        📞 ${m.tel}
      </div>
      <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:16px;margin-bottom:20px;text-align:left">
        <div style="font-size:12px;font-weight:700;color:#16a34a;margin-bottom:6px">O que fazer:</div>
        <div style="font-size:12px;color:#166534;line-height:1.8">
          1. Confirme pelo WhatsApp do consultório: ${m.tel}<br>
          2. Chegue 10 minutos antes com documento de identidade<br>
          3. Após a consulta, compre os remédios aqui no FarmaClub<br>
          4. Código do agendamento: <strong>${agend.id}</strong>
        </div>
      </div>
      <button onclick="navTo('inicio')" style="width:100%;padding:13px;background:#1A5FA8;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">Voltar ao início</button>
      <button onclick="navTo('busca')" style="width:100%;padding:11px;background:transparent;border:1.5px solid #e0e0e0;color:#9a9eb8;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px">Comprar medicamentos</button>
    </div>`;
};



// INIT
atualizarTopUser();
rc();

// PWA
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
  let dp;
  window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dp=e;setTimeout(()=>{
    if(window.matchMedia('(display-mode: standalone)').matches||localStorage.getItem('fc_pwa'))return;
    const b=document.createElement('div');
    b.style.cssText='position:fixed;bottom:72px;left:12px;right:12px;background:#fff;border-radius:14px;padding:14px;box-shadow:0 8px 30px rgba(0,0,0,.2);z-index:9999;border:1.5px solid #3BAA35;display:flex;align-items:center;gap:12px';
    b.innerHTML=`<img src="icons/cliente-72.png" style="width:44px;height:44px;border-radius:10px;flex-shrink:0"><div style="flex:1"><div style="font-weight:700;font-size:13px">Instalar FarmaClub</div><div style="font-size:11px;color:#666">Acesso rápido na tela inicial</div></div><div style="display:flex;gap:6px"><button onclick="this.closest('div').remove();localStorage.setItem('fc_pwa','1')" style="padding:6px 10px;background:#f5f5f5;border:none;border-radius:7px;font-size:12px;cursor:pointer">Não</button><button id="_binst" style="padding:6px 10px;background:#3BAA35;border:none;border-radius:7px;font-size:12px;font-weight:700;color:#fff;cursor:pointer">Instalar</button></div>`;
    document.body.appendChild(b);
    document.getElementById('_binst').addEventListener('click',async()=>{if(dp){dp.prompt();const{outcome}=await dp.userChoice;if(outcome==='accepted')localStorage.setItem('fc_pwa','1');}b.remove();});
    setTimeout(()=>{if(b.parentNode)b.remove();},8000);
  },5000);});
}
</script>
