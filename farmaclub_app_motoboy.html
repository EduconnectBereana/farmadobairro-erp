<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>FarmaClub — App Motoboy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,sans-serif;background:#1a1a2e;color:#fff;font-size:14px;min-height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input{font-family:inherit;outline:none}
.topbar{background:#14152a;padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,.1)}
.logo-row{display:flex;align-items:center;gap:8px}
.logo-row img{height:30px;filter:brightness(0) invert(1)}
.logo-txt{font-size:15px;font-weight:700}
.status-pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer}
#content{flex:1;overflow-y:auto;padding-bottom:70px}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#14152a;border-top:1px solid rgba(255,255,255,.1);display:flex;z-index:100}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:8px 0;background:transparent;font-size:10px;font-weight:600;color:rgba(255,255,255,.4)}
.bnav-btn.ativo{color:#3BAA35}
.bnav-ico{font-size:20px;line-height:1}
.card{background:#14152a;border-radius:14px;border:1px solid rgba(255,255,255,.1);margin:0 12px 12px;padding:16px}
.card-light{background:#1e2040;border-radius:14px;border:1px solid rgba(255,255,255,.08);margin:0 12px 12px;padding:14px}
.ped-card{background:#1e2040;border-radius:14px;margin:0 12px 10px;padding:14px;border:1.5px solid rgba(255,255,255,.08);cursor:pointer;transition:border-color .15s}
.ped-card:hover{border-color:#3BAA35}
.ped-card.ativo{border-color:#3BAA35;background:#1a2e1a}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.btn-pri{width:100%;padding:13px;border-radius:12px;font-size:14px;font-weight:700;border:none;cursor:pointer;margin-top:8px}
.btn-sec{width:100%;padding:11px;border-radius:12px;font-size:13px;font-weight:600;border:1.5px solid rgba(255,255,255,.2);background:transparent;color:#fff;cursor:pointer;margin-top:8px}
.kpi{background:#1e2040;border-radius:10px;padding:12px;text-align:center}
.kpi-val{font-size:22px;font-weight:700;color:#3BAA35}
.kpi-lbl{font-size:11px;color:rgba(255,255,255,.5);margin-top:3px}
.divider{height:1px;background:rgba(255,255,255,.07);margin:10px 0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live{animation:pulse 1.6s infinite}
.empty{text-align:center;padding:40px 20px;color:rgba(255,255,255,.4)}
.step{display:flex;gap:12px;margin-bottom:16px;align-items:flex-start}
.step-ico{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.scanner-wrap{background:#0d0d1a;border-radius:14px;padding:24px;text-align:center;margin:0 12px 12px;border:2px dashed rgba(255,255,255,.2)}
</style>

  <!-- PWA — FarmaClub Motoboy -->
  <link rel="manifest" href="manifest-motoboy.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="FC Motoboy">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="App de entregas para motoboys parceiros FarmaClub em Itaperuna/RJ.">
  <link rel="apple-touch-icon" href="icons/motoboy-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/motoboy-152.png">
</head>
<body>

<div class="topbar">
  <div class="logo-row">
    <img src="farmaclub_logo.png" alt="" onerror="this.style.display='none'">
    <span class="logo-txt">Motoboy</span>
  </div>
  <button class="status-pill" id="status-btn" onclick="toggleStatus()">
    ● Disponível
  </button>
</div>

<div id="content"></div>

<nav class="bnav">
  <button class="bnav-btn ativo" id="bn-home" onclick="navTo('home')"><span class="bnav-ico">🏠</span>Home</button>
  <button class="bnav-btn" id="bn-pedidos" onclick="navTo('pedidos')"><span class="bnav-ico">📦</span>Pedidos</button>
  <button class="bnav-btn" id="bn-historico" onclick="navTo('historico')"><span class="bnav-ico">📋</span>Histórico</button>
  <button class="bnav-btn" id="bn-ganhos" onclick="navTo('ganhos')"><span class="bnav-ico">💰</span>Ganhos</button>
</nav>

<script>
// ── DADOS ──
const NOME_MOTOBOY = "Carlos Mendes";
const VALOR_ENTREGA = 6.00;
const fmt = v => "R$ "+v.toFixed(2).replace(".",",");

// Status do motoboy
let statusAtivo = true; // disponível ou não
let tela = "home";
let pedidoEmAndamento = null; // pedido que está entregando agora
let etapaEntrega = 0; // 0=ir farmácia, 1=coletar, 2=entregar, 3=concluído

// ── PEDIDOS (lê do localStorage — criados pelo App Cliente) ──
function getPedidos(){
  return JSON.parse(localStorage.getItem("fc_pedidos_live")||"[]");
}

function getPedidosPendentes(){
  return getPedidos().filter(p=>p.status==="aguardando"&&!p.motoboy);
}

function atualizarStatus(pedId, novoStatus, motoboyNome){
  const peds = getPedidos();
  const idx = peds.findIndex(p=>p.id===pedId);
  if(idx>=0){
    peds[idx].status = novoStatus;
    if(motoboyNome) peds[idx].motoboy = motoboyNome;
    localStorage.setItem("fc_pedidos_live", JSON.stringify(peds));
  }
}

// ── NAVEGAÇÃO ──
function navTo(t){
  tela=t;
  ["home","pedidos","historico","ganhos"].forEach(x=>{
    const e=document.getElementById("bn-"+x);
    if(e) e.className="bnav-btn"+(x===t?" ativo":"");
  });
  rc();
}
window.navTo=navTo;

function toggleStatus(){
  statusAtivo=!statusAtivo;
  const btn=document.getElementById("status-btn");
  if(btn){
    btn.style.background=statusAtivo?"rgba(59,170,53,.2)":"rgba(220,38,38,.2)";
    btn.style.color=statusAtivo?"#3BAA35":"#E03A3A";
    btn.textContent=(statusAtivo?"● Disponível":"○ Indisponível");
  }
  rc();
}

// ── RENDER ──
function rc(){
  const r={home:rHome,pedidos:rPedidos,historico:rHistorico,ganhos:rGanhos,entrega:rEntrega};
  document.getElementById("content").innerHTML=(r[tela]||rHome)();
}

// HOME
function rHome(){
  const pendentes=getPedidosPendentes();
  const hoje=JSON.parse(localStorage.getItem("fc_entregas_hoje")||"[]");
  const ganhoHoje=hoje.length*VALOR_ENTREGA;

  return`
    <div style="padding:20px 16px 0">
      <div style="font-size:18px;font-weight:700;margin-bottom:4px">Olá, ${NOME_MOTOBOY.split(" ")[0]}! 👋</div>
      <div style="font-size:13px;color:rgba(255,255,255,.6);margin-bottom:20px">${statusAtivo?`<span style="color:#3BAA35" class="live">●</span> Você está disponível`:`<span style="color:#E03A3A">○</span> Você está indisponível`}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px">
        <div class="kpi"><div class="kpi-val">${hoje.length}</div><div class="kpi-lbl">Entregas hoje</div></div>
        <div class="kpi"><div class="kpi-val">${fmt(ganhoHoje)}</div><div class="kpi-lbl">Ganhos hoje</div></div>
        <div class="kpi"><div class="kpi-val">${pendentes.length}</div><div class="kpi-lbl">Novos pedidos</div></div>
      </div>
    </div>

    ${pedidoEmAndamento?`
      <div style="background:linear-gradient(135deg,#3BAA35,#2E8A2A);border-radius:14px;margin:0 12px 14px;padding:16px">
        <div style="font-size:12px;font-weight:700;opacity:.9;margin-bottom:6px">🛵 ENTREGA EM ANDAMENTO</div>
        <div style="font-size:16px;font-weight:700;margin-bottom:4px">${pedidoEmAndamento.id} · ${pedidoEmAndamento.cliente}</div>
        <div style="font-size:12px;opacity:.85;margin-bottom:12px">${pedidoEmAndamento.endereco}</div>
        <button onclick="tela='entrega';rc()" style="width:100%;padding:11px;background:rgba(255,255,255,.25);border-radius:10px;color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer">
          Continuar entrega →
        </button>
      </div>`:""}

    ${pendentes.length>0&&statusAtivo?`
      <div style="padding:0 12px;margin-bottom:10px">
        <div style="font-size:13px;font-weight:700;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">
          📦 Novos pedidos (${pendentes.length})
        </div>
        ${pendentes.slice(0,3).map(p=>pedCardPreview(p)).join("")}
      </div>`
    :statusAtivo?`<div class="empty"><div style="font-size:40px;margin-bottom:12px">⏳</div>Aguardando novos pedidos...<br><small style="font-size:11px;margin-top:8px;display:block">Você receberá notificação quando um pedido chegar</small></div>`
    :`<div class="empty"><div style="font-size:40px;margin-bottom:12px">😴</div>Você está indisponível<br><small style="font-size:11px;margin-top:8px;display:block">Toque em "Indisponível" para ficar disponível</small></div>`}`;
}

function pedCardPreview(p){
  const itens=p.itens||[];
  const totalItens=itens.reduce((s,i)=>s+i.qtd,0);
  return`<div class="ped-card" onclick="aceitarPedido('${p.id}')">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
      <div>
        <div style="font-size:15px;font-weight:700">${p.id}</div>
        <div style="font-size:12px;color:rgba(255,255,255,.6);margin-top:2px">${p.cliente}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:15px;font-weight:700;color:#3BAA35">${fmt(p.total)}</div>
        <div style="font-size:11px;color:rgba(255,255,255,.5)">+${fmt(VALOR_ENTREGA)} para você</div>
      </div>
    </div>
    <div class="divider"></div>
    <div style="font-size:12px;color:rgba(255,255,255,.7);margin-top:8px">
      🏥 <strong>${p.farmacia}</strong><br>
      📍 ${p.endereco}<br>
      💊 ${totalItens} produto(s) · ${p.pagamento||"Pix"}
    </div>
    <button style="width:100%;padding:11px;background:#3BAA35;color:#fff;border-radius:10px;font-size:14px;font-weight:700;border:none;cursor:pointer;margin-top:12px">
      ✅ Aceitar entrega — ${fmt(VALOR_ENTREGA)}
    </button>
  </div>`;
}

window.aceitarPedido=function(pedId){
  const peds=getPedidos();
  const p=peds.find(x=>x.id===pedId);
  if(!p){alert("Pedido não encontrado.");return;}
  atualizarStatus(pedId,"coletando",NOME_MOTOBOY);
  pedidoEmAndamento={...p,motoboy:NOME_MOTOBOY,status:"coletando"};
  etapaEntrega=0;
  tela="entrega";
  rc();
};

// PEDIDOS DISPONÍVEIS
function rPedidos(){
  const pendentes=getPedidosPendentes();
  return`
    <div style="padding:16px 12px 8px;font-size:13px;font-weight:700;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.5px">
      Pedidos disponíveis (${pendentes.length})
    </div>
    ${pendentes.length===0
      ?`<div class="empty"><div style="font-size:40px;margin-bottom:12px">📭</div>Nenhum pedido disponível agora</div>`
      :pendentes.map(p=>pedCardPreview(p)).join("")}`;
}

// ENTREGA EM ANDAMENTO
function rEntrega(){
  if(!pedidoEmAndamento){tela="home";return rHome();}
  const p=pedidoEmAndamento;
  const etapas=[
    {tit:"Ir até a farmácia",sub:`${p.farmacia}`,ico:"🏍️",cor:"#1A5FA8",btn:"Cheguei na farmácia"},
    {tit:"Coletar os produtos",sub:"Confirme cada item antes de sair",ico:"🏥",cor:"#d97706",btn:"Todos os itens coletados ✓"},
    {tit:"Entregar ao cliente",sub:p.endereco,ico:"🛵",cor:"#3BAA35",btn:"Entrega confirmada ✅"},
    {tit:"Entrega concluída!",sub:"Pedido finalizado com sucesso",ico:"🎉",cor:"#3BAA35",btn:""},
  ];
  const et=etapas[etapaEntrega];

  return`
    <div style="background:${et.cor};padding:16px;text-align:center;margin-bottom:2px">
      <div style="font-size:40px;margin-bottom:8px">${et.ico}</div>
      <div style="font-size:17px;font-weight:700">${et.tit}</div>
      <div style="font-size:12px;opacity:.85;margin-top:4px">${et.sub}</div>
    </div>

    <div class="card">
      <div style="font-size:12px;font-weight:700;color:rgba(255,255,255,.5);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px">Pedido ${p.id}</div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <div><div style="font-weight:600">${p.cliente}</div><div style="font-size:12px;color:rgba(255,255,255,.6)">${p.endereco}</div></div>
        <div style="text-align:right"><div style="font-size:15px;font-weight:700;color:#3BAA35">${fmt(p.total)}</div><div style="font-size:11px;color:rgba(255,255,255,.5)">${p.pagamento||"Pix"}</div></div>
      </div>
    </div>

    ${etapaEntrega===1?rColetarItens(p):""}

    ${etapaEntrega<3?`
      <div style="padding:0 12px">
        <button onclick="avancarEtapa()" class="btn-pri" style="background:${et.cor};color:#fff">${et.btn}</button>
        ${etapaEntrega>0?`<button onclick="voltarEtapa()" class="btn-sec">← Voltar</button>`:""}
      </div>`
    :`<div style="padding:0 12px">
        <div style="text-align:center;padding:20px 0">
          <div style="font-size:48px;margin-bottom:10px">🎉</div>
          <div style="font-size:18px;font-weight:700;color:#3BAA35;margin-bottom:6px">Entrega concluída!</div>
          <div style="font-size:13px;color:rgba(255,255,255,.6);margin-bottom:20px">+${fmt(VALOR_ENTREGA)} adicionado aos seus ganhos</div>
        </div>
        <button onclick="finalizarEntrega()" class="btn-pri" style="background:#3BAA35;color:#fff">✓ Voltar ao início</button>
      </div>`}

    <!-- BARRA DE PROGRESSO -->
    <div style="padding:16px 12px 0">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        ${["Ir","Coletar","Entregar","Pronto"].map((s,i)=>`
          <div style="text-align:center;flex:1">
            <div style="width:28px;height:28px;border-radius:50%;background:${i<=etapaEntrega?et.cor:"rgba(255,255,255,.1)"};display:flex;align-items:center;justify-content:center;font-size:12px;margin:0 auto;font-weight:700">${i<etapaEntrega?"✓":i+1}</div>
            <div style="font-size:9px;color:rgba(255,255,255,.5);margin-top:4px">${s}</div>
          </div>`).join("")}
      </div>
    </div>`;
}

function rColetarItens(p){
  const itens=p.itens||[];
  let coletados=JSON.parse(localStorage.getItem("fc_coletados_"+p.id)||"{}");
  const todos=itens.every(it=>coletados[it.pid||it.prodId]);
  return`
    <div class="card" style="background:#0d1a0d;border-color:#3BAA35">
      <div style="font-size:12px;font-weight:700;color:#3BAA35;margin-bottom:12px">
        📋 Confirme cada produto antes de sair
        ${todos?`<span style="margin-left:8px;background:#3BAA35;color:#fff;border-radius:10px;padding:2px 8px">Tudo OK ✓</span>`:""}
      </div>
      ${itens.map(it=>{
        const key=it.pid||it.prodId||it.id;
        const ok=!!coletados[key];
        return`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.07);opacity:${ok?1:.7}">
          <div style="font-size:24px;flex-shrink:0">${it.ico||"💊"}</div>
          <div style="flex:1">
            <div style="font-size:12px;font-weight:600;${ok?"text-decoration:line-through;color:rgba(255,255,255,.4)":""}">${it.nome}</div>
            <div style="font-size:11px;color:rgba(255,255,255,.5);">Qtd: ${it.qtd}</div>
          </div>
          <button onclick="confirmarItem('${p.id}','${key}')"
            style="padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;border:none;cursor:pointer;background:${ok?"rgba(59,170,53,.2)":"#3BAA35"};color:${ok?"#3BAA35":"#fff"}">
            ${ok?"✓ OK":"Confirmar"}
          </button>
        </div>`;}).join("")}
      <div style="font-size:11px;color:rgba(255,255,255,.4);margin-top:10px;line-height:1.5">
        ⚠️ Confirme todos os itens antes de sair da farmácia. Produto errado = responsabilidade do motoboy.
      </div>
    </div>`;
}

window.confirmarItem=function(pedId, itemKey){
  let col=JSON.parse(localStorage.getItem("fc_coletados_"+pedId)||"{}");
  col[itemKey]=!col[itemKey];
  localStorage.setItem("fc_coletados_"+pedId,JSON.stringify(col));
  rc();
};

window.avancarEtapa=function(){
  if(!pedidoEmAndamento)return;
  // Validar coleta na etapa 1
  if(etapaEntrega===1){
    const itens=pedidoEmAndamento.itens||[];
    const col=JSON.parse(localStorage.getItem("fc_coletados_"+pedidoEmAndamento.id)||"{}");
    const todos=itens.every(it=>col[it.pid||it.prodId||it.id]);
    if(!todos){alert("⚠️ Confirme todos os produtos antes de continuar!");return;}
    atualizarStatus(pedidoEmAndamento.id,"entregando",NOME_MOTOBOY);
    pedidoEmAndamento.status="entregando";
  }
  etapaEntrega++;
  if(etapaEntrega>=3){
    atualizarStatus(pedidoEmAndamento.id,"entregue",NOME_MOTOBOY);
    pedidoEmAndamento.status="entregue";
  }
  rc();
};

window.voltarEtapa=function(){
  if(etapaEntrega>0) etapaEntrega--;
  rc();
};

window.finalizarEntrega=function(){
  // Registrar nos ganhos de hoje
  const hoje=JSON.parse(localStorage.getItem("fc_entregas_hoje")||"[]");
  hoje.push({id:pedidoEmAndamento.id,ts:Date.now(),valor:VALOR_ENTREGA});
  localStorage.setItem("fc_entregas_hoje",JSON.stringify(hoje));
  localStorage.removeItem("fc_coletados_"+pedidoEmAndamento.id);
  pedidoEmAndamento=null;
  etapaEntrega=0;
  tela="home";
  rc();
};

// HISTÓRICO
function rHistorico(){
  const peds=getPedidos().filter(p=>p.motoboy===NOME_MOTOBOY).reverse();
  if(!peds.length)return`<div class="empty"><div style="font-size:40px;margin-bottom:12px">📋</div>Nenhuma entrega ainda</div>`;
  return`
    <div style="padding:16px 12px 8px;font-size:13px;font-weight:700;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.5px">
      Suas entregas (${peds.length})
    </div>
    ${peds.map(p=>`
      <div class="card-light" style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
          <div>
            <div style="font-weight:600">${p.id}</div>
            <div style="font-size:12px;color:rgba(255,255,255,.6)">${p.cliente} · ${p.data||""}</div>
          </div>
          <div style="text-align:right">
            <span style="background:${p.status==="entregue"?"rgba(59,170,53,.2)":"rgba(26,95,168,.2)"};color:${p.status==="entregue"?"#3BAA35":"#4A9FD4"};padding:3px 8px;border-radius:10px;font-size:11px;font-weight:600">${p.status==="entregue"?"✓ Entregue":"Em andamento"}</span>
            <div style="font-size:13px;font-weight:700;color:#3BAA35;margin-top:4px">+${fmt(VALOR_ENTREGA)}</div>
          </div>
        </div>
        <div style="font-size:12px;color:rgba(255,255,255,.5)">📍 ${p.endereco}</div>
      </div>`).join("")}`;
}

// GANHOS
function rGanhos(){
  const hoje=JSON.parse(localStorage.getItem("fc_entregas_hoje")||"[]");
  const peds=getPedidos().filter(p=>p.motoboy===NOME_MOTOBOY&&p.status==="entregue");
  const ganhoTotal=peds.length*VALOR_ENTREGA;
  const ganhoHoje=hoje.length*VALOR_ENTREGA;
  const semana=Math.min(hoje.length*3,peds.length)*VALOR_ENTREGA;

  return`
    <div style="padding:20px 12px 10px">
      <div style="font-size:14px;font-weight:700;color:rgba(255,255,255,.6);margin-bottom:16px">SEUS GANHOS</div>
      <div style="background:linear-gradient(135deg,#3BAA35,#2E8A2A);border-radius:16px;padding:20px;margin-bottom:16px;text-align:center">
        <div style="font-size:13px;opacity:.85;margin-bottom:6px">Total geral</div>
        <div style="font-size:36px;font-weight:700">${fmt(ganhoTotal)}</div>
        <div style="font-size:12px;opacity:.75;margin-top:6px">${peds.length} entregas · R$ ${VALOR_ENTREGA.toFixed(2)} cada</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
        <div class="kpi"><div class="kpi-val">${fmt(ganhoHoje)}</div><div class="kpi-lbl">Hoje</div></div>
        <div class="kpi"><div class="kpi-val">${fmt(semana)}</div><div class="kpi-lbl">Esta semana</div></div>
      </div>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('[FC Motoboy] SW registrado:', reg.scope))
      .catch(err => console.log('[FC Motoboy] SW falhou:', err));
  });

  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    setTimeout(() => mostrarBannerMotoboy(deferredPrompt), 3000);
  });
}

function mostrarBannerMotoboy(prompt) {
  if (window.matchMedia('(display-mode: standalone)').matches) return;
  if (localStorage.getItem('fc_motoboy_instalado')) return;

  const banner = document.createElement('div');
  banner.style.cssText = `
    position:fixed;bottom:72px;left:12px;right:12px;
    background:#1e2040;border-radius:14px;padding:14px;
    box-shadow:0 8px 30px rgba(0,0,0,.4);z-index:9999;
    border:1.5px solid #3BAA35;display:flex;align-items:center;gap:12px;
  `;
  banner.innerHTML = `
    <img src="icons/motoboy-72.png" style="width:48px;height:48px;border-radius:10px;flex-shrink:0">
    <div style="flex:1">
      <div style="font-weight:700;font-size:13px;color:#fff">Instalar app do Motoboy</div>
      <div style="font-size:11px;color:rgba(255,255,255,.6);margin-top:2px">Acesso rápido direto da tela inicial</div>
    </div>
    <div style="display:flex;gap:6px;flex-shrink:0">
      <button onclick="this.closest('div[style]').remove();localStorage.setItem('fc_motoboy_instalado','sim')"
        style="padding:7px 12px;background:rgba(255,255,255,.1);border:none;border-radius:8px;font-size:12px;cursor:pointer;color:rgba(255,255,255,.7)">Não</button>
      <button id="btn-inst-mb"
        style="padding:7px 12px;background:#3BAA35;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;color:#fff">Instalar</button>
    </div>
  `;
  document.body.appendChild(banner);

  document.getElementById('btn-inst-mb').addEventListener('click', async () => {
    if (!prompt) return;
    prompt.prompt();
    const { outcome } = await prompt.userChoice;
    if (outcome === 'accepted') localStorage.setItem('fc_motoboy_instalado', 'sim');
    banner.remove();
  });

  setTimeout(() => { if (banner.parentNode) banner.remove(); }, 8000);
}
</script>
