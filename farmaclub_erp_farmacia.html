// Calcular imposto real e preço mínimo
function calcTributo(custo, categoria, margem_desejada) {
  const t = TRIBUTOS[categoria] || TRIBUTOS["mip"];
  // No Simples, o imposto já está incluído no DAS sobre o faturamento
  // Imposto real embutido no preço = alíquota Simples + carga específica
  const carga_total = t.simples + (t.icms > 0 ? t.icms * 0.15 : 0); // ICMS parcialmente embutido
  const preco_sem_margem = custo / (1 - carga_total/100);
  const preco_com_margem = custo * (1 + margem_desejada/100);
  const preco_minimo = Math.max(preco_sem_margem, custo * 1.10); // mínimo 10% acima do custo
  const margem_real = ((preco_com_margem - custo) / preco_com_margem * 100);
  const imposto_embutido = preco_com_margem * carga_total / 100;
  const lucro_liquido = preco_com_margem - custo - imposto_embutido;
  return {
    preco_sugerido: +preco_com_margem.toFixed(2),
    preco_minimo: +preco_minimo.toFixed(2),
    margem_real: +margem_real.toFixed(1),
    imposto_embutido: +imposto_embutido.toFixed(2),
    lucro_liquido: +lucro_liquido.toFixed(2),
    carga_total: +carga_total.toFixed(1),
  };
}

window.pdvBusca=function(q){

  if(!res||q.length<2){if(res)res.innerHTML="";return;}
  const found=produtos.filter(p=>p.nome.toLowerCase().includes(q.toLowerCase())||p.codigo.includes(q));
  res.innerHTML=found.slice(0,5).map(p=>`
    <div onclick="addPDV(${p.id})" style="display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border:1px solid #eee;border-radius:8px;cursor:pointer;background:#fff" onmouseover="this.style.background='#f8f8f8'" onmouseout="this.style.background='#fff'">

        <div style="font-size:10px;color:#aaa">Estoque: ${p.estoque} un</div>

      <div style="font-weight:700;color:${T}">${fmt(p.preco)}</div>
    </div>`).join("")||`<div style="font-size:12px;color:#aaa;padding:8px">Nenhum produto encontrado</div>`;
};

window.addPDV=function(id){
  const p=produtos.find(x=>x.id===id);if(!p) return;
  const ex=vendaItens.find(x=>x.id===id);
  if(ex)ex.qtd++;else vendaItens.push({...p,qtd:1});
  renderContent();
  setTimeout(()=>{const el=document.getElementById("buscaPDV");if(el)el.focus();},50);
};
window.remPDV=function(i){vendaItens.splice(i,1);renderContent();};
window.selForma=function(btn){
  document.querySelectorAll("#content .qty-ctrl ~ button, .card button[onclick='selForma(this)']").forEach(b=>{b.style.background="transparent";b.style.color="#666";});
  btn.style.background="#3BAA35";btn.style.color="#fff";
};
window.finalizarVenda=function(){
  if(!vendaItens.length){alert("Adicione produtos ao carrinho.");return;}
  alert("Venda finalizada! Total: "+fmt(vendaItens.reduce((s,i)=>s+i.preco*i.qtd,0)));
  vendaItens=[];renderContent();
};

// Estado do módulo judicial
let judItens = [];
let judPaciente = {nome:"", cpf:"", processo:"", vara:"Vara da Fazenda Pública — Itaperuna/RJ", validade:30};
let judEtapa = "orcamento"; // orcamento | aprovado | historico

function renderJudicial(){
  const farmInfo = {
    nome: "Farmácia São João",
    cnpj: "12.345.678/0001-90",
    crf: "CRF-RJ 12345",
    responsavel: "João Carlos Oliveira",
    endereco: "Rua Getúlio Vargas, 342 — Centro, Itaperuna/RJ",
    telefone: "(22) 3822-1234"
  };

  const total = judItens.reduce((s,i)=>s+(i.preco*i.qtd),0);
  const dataValidade = new Date();
  dataValidade.setDate(dataValidade.getDate() + judPaciente.validade);
  const dtVal = dataValidade.toLocaleDateString("pt-BR");
  const dtHoje = new Date().toLocaleDateString("pt-BR");

  // Busca na rede (simulated)
  const redeDisponivel = [
    {farm:"Vida & Saúde", bairro:"Parque Noel", dist:"1.8km"},
    {farm:"Drogaria Esperança", bairro:"M. do Crica", dist:"2.8km"},
  ];

  return `
    <!-- CABEÇALHO JUDICIAL -->
    <div style="background:linear-gradient(135deg,#1A5FA8,#1450a0);border-radius:12px;padding:16px 20px;margin-bottom:16px;color:#fff;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">

        <div style="font-size:12px;opacity:.8;margin-top:3px">Para ações judiciais de fornecimento de medicamentos · Fórum de Itaperuna/RJ</div>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="judEtapa='orcamento';renderContent()" style="padding:7px 14px;border-radius:8px;border:2px solid rgba(255,255,255,${judEtapa==='orcamento'?'1':'.4'});background:${judEtapa==='orcamento'?'rgba(255,255,255,.2)':'transparent'};color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">Novo orçamento</button>

        <button onclick="judEtapa='historico';renderContent()" style="padding:7px 14px;border-radius:8px;border:2px solid rgba(255,255,255,${judEtapa==='historico'?'1':'.4'});background:${judEtapa==='historico'?'rgba(255,255,255,.2)':'transparent'};color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">Histórico</button>
      </div>
    </div>

    ${judEtapa === "historico" ? renderJudHistorico() : judEtapa === "aprovado" ? renderJudAprovado(total, farmInfo, dtHoje) : renderJudOrcamento(total, farmInfo, dtHoje, dtVal, redeDisponivel)}
  `;
}

function renderJudOrcamento(total, farmInfo, dtHoje, dtVal, redeDisponivel){
  const itensHTML = judItens.length === 0
    ? `<div style="text-align:center;padding:24px;color:#aaa;font-size:13px">Nenhum medicamento adicionado ainda.<br>Use a busca abaixo para adicionar.</div>`
    : judItens.map((it,i)=>`
        <tr style="border-bottom:1px solid #f5f5f5">
          <td style="padding:8px 10px;font-size:12px">
            <div style="font-weight:500">${it.nome}</div>
            <div style="font-size:10px;color:#888">${it.cod}</div>
          </td>
          <td style="padding:8px 6px;text-align:center">
            <div style="display:flex;align-items:center;gap:4px;justify-content:center">
              <button onclick="judQtd(${i},-1)" style="width:22px;height:22px;border:1px solid #ddd;border-radius:4px;background:#f5f5f5;cursor:pointer;font-size:13px;line-height:1">−</button>
              <span style="font-weight:600;min-width:24px;text-align:center">${it.qtd}</span>
              <button onclick="judQtd(${i},1)" style="width:22px;height:22px;border:1px solid #ddd;border-radius:4px;background:#f5f5f5;cursor:pointer;font-size:13px;line-height:1">+</button>
            </div>
          </td>
          <td style="padding:8px 6px;text-align:center;font-size:11px;color:#888">${it.unid}</td>
          <td style="padding:8px 10px;text-align:right;font-size:12px">${fmt(it.preco)}</td>
          <td style="padding:8px 10px;text-align:right;font-weight:700;color:#1A5FA8">${fmt(it.preco*it.qtd)}</td>
          <td style="padding:6px 8px"><button onclick="judRemover(${i})" style="background:#fef2f2;color:#dc2626;border:none;border-radius:5px;padding:4px 8px;cursor:pointer;font-size:11px">✕</button></td>
        </tr>`).join("");

  return `
    <div style="display:grid;grid-template-columns:1fr 380px;gap:16px;align-items:start">

      <!-- COLUNA ESQUERDA -->
      <div>

        <!-- DADOS DO PACIENTE -->
        <div class="card" style="margin-bottom:14px">
          <div style="font-size:13px;font-weight:600;margin-bottom:12px;color:#1A5FA8">👤 Dados do paciente</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
            <div>
              <label style="font-size:11px;color:#888;display:block;margin-bottom:3px">Nome completo *</label>
              <input type="text" id="jud-nome" value="${judPaciente.nome}" placeholder="Nome do paciente"
                oninput="judPaciente.nome=this.value"
                style="width:100%;padding:9px;border:1px solid #ddd;border-radius:7px;font-size:12px">
            </div>
            <div>
              <label style="font-size:11px;color:#888;display:block;margin-bottom:3px">CPF *</label>
              <input type="text" id="jud-cpf" value="${judPaciente.cpf}" placeholder="000.000.000-00"
                oninput="judPaciente.cpf=this.value"
                style="width:100%;padding:9px;border:1px solid #ddd;border-radius:7px;font-size:12px">
            </div>
            <div>
              <label style="font-size:11px;color:#888;display:block;margin-bottom:3px">Número do processo (opcional)</label>
              <input type="text" id="jud-proc" value="${judPaciente.processo}" placeholder="Ex: 0001234-56.2024.8.19.0000"
                oninput="judPaciente.processo=this.value"
                style="width:100%;padding:9px;border:1px solid #ddd;border-radius:7px;font-size:12px">
            </div>
            <div>
              <label style="font-size:11px;color:#888;display:block;margin-bottom:3px">Vara / Fórum</label>
              <input type="text" id="jud-vara" value="${judPaciente.vara}"
                oninput="judPaciente.vara=this.value"
                style="width:100%;padding:9px;border:1px solid #ddd;border-radius:7px;font-size:12px">
            </div>
          </div>
          <div>
            <label style="font-size:11px;color:#888;display:block;margin-bottom:3px">Validade do orçamento: <strong style="color:#1A5FA8">${judPaciente.validade} dias</strong> (vence em ${dtVal})</label>
            <input type="range" min="7" max="60" value="${judPaciente.validade}"
              oninput="judPaciente.validade=parseInt(this.value);renderContent()"
              style="width:100%;accent-color:#1A5FA8">
          </div>
        </div>

        <!-- BUSCA RÁPIDA -->
        <div class="card" style="margin-bottom:14px">
          <div style="font-size:13px;font-weight:600;margin-bottom:10px;color:#1A5FA8">🔍 Adicionar medicamento</div>
          <div style="position:relative;margin-bottom:10px">
            <input type="text" id="jud-busca" placeholder="Buscar por nome, princípio ativo ou código..."
              oninput="judBuscar(this.value)"
              style="width:100%;padding:10px 12px;border:1.5px solid #1A5FA8;border-radius:8px;font-size:13px;outline:none">
            <div id="jud-ac" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ddd;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:100;max-height:240px;overflow-y:auto;margin-top:3px"></div>
          </div>
          <div style="font-size:11px;color:#888;margin-bottom:8px">Medicamentos judiciais mais solicitados em Itaperuna:</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${["Insulina Glargina","Adalimumabe","Rituximabe","Fingolimode","Tacrolimo","Metilfenidato","Etanercepte","Natalizumabe"].map(n=>`
              <button onclick="judAtalho('${n}')"
                style="padding:5px 10px;border:1px solid #bfdbfe;background:#eff6ff;color:#1A5FA8;border-radius:20px;font-size:11px;cursor:pointer;font-family:inherit">${n}</button>`).join("")}
          </div>
        </div>

        <!-- LISTA DE ITENS -->
        <div class="card">
          <div style="font-size:13px;font-weight:600;margin-bottom:12px;color:#1A5FA8">💊 Medicamentos do orçamento</div>
          <div style="overflow-x:auto">
            <table style="width:100%;border-collapse:collapse">
              <thead style="background:#f8f8f8">
                <tr>
                  <th style="padding:8px 10px;text-align:left;font-size:11px;color:#888;font-weight:500">Medicamento</th>
                  <th style="padding:8px 6px;text-align:center;font-size:11px;color:#888;font-weight:500">Qtd</th>
                  <th style="padding:8px 6px;text-align:center;font-size:11px;color:#888;font-weight:500">Unid</th>
                  <th style="padding:8px 10px;text-align:right;font-size:11px;color:#888;font-weight:500">Unit.</th>
                  <th style="padding:8px 10px;text-align:right;font-size:11px;color:#888;font-weight:500">Total</th>
                  <th style="padding:8px;font-size:11px;color:#888;font-weight:500"></th>
                </tr>
              </thead>
              <tbody>${itensHTML}</tbody>
              ${judItens.length>0?`<tfoot><tr>
                <td colspan="4" style="padding:10px;font-weight:700;text-align:right;border-top:2px solid #e0e0e0;font-size:13px">TOTAL DO ORÇAMENTO</td>
                <td style="padding:10px;font-weight:700;color:#1A5FA8;font-size:16px;border-top:2px solid #e0e0e0;text-align:right">${fmt(total)}</td>
                <td style="border-top:2px solid #e0e0e0"></td>
              </tr></tfoot>`:""}
            </table>
          </div>
        </div>
      </div>

      <!-- COLUNA DIREITA: preview + ações -->
      <div>

        <!-- PRÉVIA DO DOCUMENTO -->
        <div class="card" style="margin-bottom:14px;border:2px solid #1A5FA8">
          <div style="font-size:12px;font-weight:700;color:#1A5FA8;margin-bottom:12px;letter-spacing:.5px;text-transform:uppercase">📄 Prévia do orçamento</div>
          <div style="background:#f8faff;border-radius:8px;padding:14px;font-size:11px;line-height:1.9;border:1px solid #e0eaff">
            <div style="text-align:center;font-weight:700;font-size:13px;margin-bottom:8px">${farmInfo.nome}</div>
            <div style="text-align:center;color:#555;margin-bottom:10px;font-size:10px">
              CNPJ: ${farmInfo.cnpj} · ${farmInfo.crf}<br>
              ${farmInfo.endereco}<br>
              Fone: ${farmInfo.telefone}
            </div>
            <div style="text-align:center;font-weight:700;border-top:1px solid #ddd;border-bottom:1px solid #ddd;padding:6px;margin-bottom:10px">
              ORÇAMENTO DE MEDICAMENTOS<br>
              <span style="font-size:10px;font-weight:400">Para fins judiciais</span>
            </div>
            <div style="margin-bottom:8px">
              <strong>Paciente:</strong> ${judPaciente.nome||"—"}<br>
              <strong>CPF:</strong> ${judPaciente.cpf||"—"}<br>
              ${judPaciente.processo?`<strong>Processo:</strong> ${judPaciente.processo}<br>`:""}
              <strong>Vara:</strong> ${judPaciente.vara}<br>
              <strong>Data:</strong> ${dtHoje} · <strong>Validade:</strong> ${dtVal}
            </div>
            <div style="border-top:1px dashed #ddd;padding-top:8px;margin-bottom:8px">
              ${judItens.length===0?`<em style="color:#aaa">Adicione medicamentos ao orçamento</em>`:
                judItens.map(it=>`
                  <div style="display:flex;justify-content:space-between">
                    <span>${it.qtd}x ${it.nome.substring(0,32)}...</span>
                    <span style="font-weight:600">${fmt(it.preco*it.qtd)}</span>
                  </div>`).join("")}
            </div>
            ${judItens.length>0?`
              <div style="border-top:1px solid #ddd;padding-top:6px;display:flex;justify-content:space-between;font-weight:700;font-size:13px">
                <span>TOTAL</span><span style="color:#1A5FA8">${fmt(total)}</span>
              </div>
              <div style="margin-top:10px;font-size:10px;color:#888;text-align:center">
                Assinatura do responsável: _______________________<br>
                ${farmInfo.responsavel} · ${farmInfo.crf}
              </div>`:""}
          </div>
        </div>

        <!-- CONSULTA NA REDE -->
        ${judItens.length>0?`
        <div class="card" style="margin-bottom:14px;border:1px solid #bbf7d0">
          <div style="font-size:12px;font-weight:700;color:#16a34a;margin-bottom:8px">🔗 Consulta na rede FarmaClub</div>
          <div style="font-size:11px;color:#555;margin-bottom:8px">Se não tiver estoque suficiente, outras farmácias parceiras podem suprir:</div>
          ${redeDisponivel.map(r=>`
            <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f5f5f5;font-size:12px">
              <span style="color:#16a34a">✓</span>
              <div style="flex:1"><strong>${r.farm}</strong> · ${r.bairro}</div>
              <span style="color:#888">${r.dist}</span>
              <button style="font-size:10px;padding:3px 8px;background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a;border-radius:5px;cursor:pointer">Solicitar</button>
            </div>`).join("")}
          <div style="font-size:10px;color:#888;margin-top:8px;line-height:1.5">A nota fiscal sai desta farmácia. A transferência entre parceiras é registrada internamente no sistema.</div>
        </div>`:""}

        <!-- AÇÕES -->
        <div style="display:grid;gap:8px">
          <button onclick="judImprimir()" ${judItens.length===0||!judPaciente.nome?"disabled":""} 
            style="padding:12px;background:${judItens.length>0&&judPaciente.nome?'#1A5FA8':'#ccc'};color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:${judItens.length>0&&judPaciente.nome?'pointer':'not-allowed'};font-family:inherit">
            🖨️ Imprimir orçamento
          </button>
          <button onclick="judSalvar()" ${judItens.length===0||!judPaciente.nome?"disabled":""}
            style="padding:12px;background:transparent;border:2px solid #1A5FA8;color:#1A5FA8;border-radius:8px;font-size:13px;font-weight:700;cursor:${judItens.length>0&&judPaciente.nome?'pointer':'not-allowed'};font-family:inherit">
            💾 Salvar rascunho
          </button>
          <button onclick="judLimpar()"
            style="padding:10px;background:transparent;border:1px solid #ddd;color:#888;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit">
            ✕ Limpar e novo orçamento
          </button>
        </div>
      </div>
    </div>`;
}

function renderJudAprovado(total, farmInfo, dtHoje){
  return `
    <div class="card" style="border:2px solid #16a34a">
      <div style="font-size:13px;font-weight:700;color:#16a34a;margin-bottom:14px">✅ Orçamento aprovado — Finalizar venda judicial</div>
      <div style="background:#f0fdf4;border-radius:8px;padding:14px;margin-bottom:14px;font-size:12px;color:#166534;line-height:1.7">
        <strong>Como proceder:</strong><br>
        1. O paciente chega com o dinheiro em espécie (valor aprovado pelo fórum)<br>
        2. Confira se o valor bate com o orçamento aprovado<br>
        3. Separe os medicamentos do estoque (ou solicite à rede FarmaClub)<br>
        4. Registre a venda abaixo — ela ficará marcada como "Venda Judicial" no financeiro<br>
        5. Entregue os medicamentos e o comprovante ao paciente
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
        <div>
          <label style="font-size:11px;color:#888;display:block;margin-bottom:3px">Nome do paciente</label>
          <input type="text" value="${judPaciente.nome}" placeholder="Nome completo"
            oninput="judPaciente.nome=this.value"
            style="width:100%;padding:9px;border:1px solid #ddd;border-radius:7px;font-size:12px">
        </div>
        <div>
          <label style="font-size:11px;color:#888;display:block;margin-bottom:3px">CPF do paciente</label>
          <input type="text" value="${judPaciente.cpf}" placeholder="000.000.000-00"
            oninput="judPaciente.cpf=this.value"
            style="width:100%;padding:9px;border:1px solid #ddd;border-radius:7px;font-size:12px">
        </div>
        <div>
          <label style="font-size:11px;color:#888;display:block;margin-bottom:3px">Nº do processo</label>
          <input type="text" value="${judPaciente.processo}"
            oninput="judPaciente.processo=this.value"
            style="width:100%;padding:9px;border:1px solid #ddd;border-radius:7px;font-size:12px">
        </div>
        <div>
          <label style="font-size:11px;color:#888;display:block;margin-bottom:3px">Valor recebido em espécie (R$)</label>
          <input type="number" id="jud-recebido" placeholder="0,00" step="0.01"
            style="width:100%;padding:9px;border:1.5px solid #16a34a;border-radius:7px;font-size:13px;font-weight:600">
        </div>
      </div>
      ${judItens.length>0?`
        <div style="background:#f8f8f8;border-radius:8px;padding:12px;margin-bottom:14px">
          ${judItens.map(it=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #eee">
            <span>${it.qtd}x ${it.nome}</span>
            <span style="font-weight:600">${fmt(it.preco*it.qtd)}</span>
          </div>`).join("")}
          <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:700;padding-top:8px">
            <span>Total do orçamento</span>
            <span style="color:#1A5FA8">${fmt(total)}</span>
          </div>
        </div>
        <button onclick="judFinalizarVenda()" style="width:100%;padding:14px;background:#16a34a;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">
          ✅ Confirmar venda judicial — ${fmt(total)}
        </button>`:`
        <div style="text-align:center;padding:20px;color:#aaa">
          Nenhum medicamento no orçamento. Vá em "Novo orçamento" e adicione os medicamentos.
        </div>`}
    </div>`;
}

function renderJudHistorico(){
  const historico = JSON.parse(localStorage.getItem("jud_historico")||"[]");
  if(!historico.length) return `
    <div class="card" style="text-align:center;padding:40px;color:#aaa">
      <div style="font-size:32px;margin-bottom:10px">📋</div>
      <div>Nenhum orçamento judicial salvo ainda.</div>
    </div>`;
  return `
    <div class="card">
      <div style="font-size:13px;font-weight:600;margin-bottom:14px;color:#1A5FA8">Histórico de orçamentos judiciais</div>
      ${historico.reverse().map((h,i)=>`
        <div style="padding:12px 0;border-bottom:${i<historico.length-1?"1px solid #f5f5f5":"none"};display:flex;align-items:center;gap:12px">
          <div style="width:40px;height:40px;border-radius:10px;background:${h.status==='vendido'?"#f0fdf4":"#eff6ff"};display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">
            ${h.status==='vendido'?"✅":"📋"}
          </div>
          <div style="flex:1">
            <div style="font-weight:600;font-size:13px">${h.paciente}</div>
            <div style="font-size:11px;color:#888;margin-top:2px">${h.data} · ${h.itens} medicamento(s) · ${fmt(h.total)}</div>
            ${h.processo?`<div style="font-size:10px;color:#aaa">Processo: ${h.processo}</div>`:""}
          </div>
          <div style="text-align:right">
            <span style="display:inline-block;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:600;background:${h.status==='vendido'?"#f0fdf4":"#eff6ff"};color:${h.status==='vendido'?"#16a34a":"#1A5FA8"}">
              ${h.status==='vendido'?"Venda efetuada":"Aguardando aprovação"}
            </span>
          </div>
        </div>`).join("")}
    </div>`;
}

// HELPERS JUDICIAL
window.judBuscar = function(q){
  const ac = document.getElementById("jud-ac");
  if(!ac) return;
  if(q.length < 2){ac.style.display="none";return;}
  const res = MED_JUDICIAIS.filter(m=>m.nome.toLowerCase().includes(q.toLowerCase())).slice(0,8);
  if(!res.length){ac.style.display="none";return;}
  ac.innerHTML = res.map((m,i)=>`
    <div onclick="judAdicionarMed(${MED_JUDICIAIS.indexOf(m)})"
      style="padding:10px 14px;cursor:pointer;border-bottom:1px solid #f5f5f5;font-size:12px"
      onmouseover="this.style.background='#f0f6ff'" onmouseout="this.style.background='#fff'">
      <div style="font-weight:500">${m.nome}</div>
      <div style="font-size:10px;color:#888;margin-top:2px">${fmt(m.preco)} / ${m.unid}</div>
    </div>`).join("");
  ac.style.display = "block";
};

window.judAtalho = function(nome){
  const idx = MED_JUDICIAIS.findIndex(m=>m.nome.includes(nome));
  if(idx>=0) judAdicionarMed(idx);
};

window.judAdicionarMed = function(idx){
  const m = MED_JUDICIAIS[idx];
  const ex = judItens.findIndex(i=>i.cod===m.cod);
  if(ex>=0){ judItens[ex].qtd++; }
  else { judItens.push({...m, qtd:1}); }
  const ac = document.getElementById("jud-ac");
  if(ac) ac.style.display="none";
  const inp = document.getElementById("jud-busca");
  if(inp) inp.value="";
  renderContent();
};

window.judQtd = function(idx, delta){
  judItens[idx].qtd += delta;
  if(judItens[idx].qtd <= 0) judItens.splice(idx,1);
  renderContent();
};

window.judRemover = function(idx){
  judItens.splice(idx,1);
  renderContent();
};

window.judLimpar = function(){
  judItens = [];
  judPaciente = {nome:"", cpf:"", processo:"", vara:"Vara da Fazenda Pública — Itaperuna/RJ", validade:30};
  renderContent();
};

window.judSalvar = function(){
  const historico = JSON.parse(localStorage.getItem("jud_historico")||"[]");
  historico.push({
    paciente: judPaciente.nome,
    cpf: judPaciente.cpf,
    processo: judPaciente.processo,
    data: new Date().toLocaleDateString("pt-BR"),
    itens: judItens.length,
    total: judItens.reduce((s,i)=>s+i.preco*i.qtd, 0),
    status: "aguardando",
    medicamentos: judItens,
  });
  localStorage.setItem("jud_historico", JSON.stringify(historico));
  alert("✓ Orçamento salvo no histórico!");
};

window.judFinalizarVenda = function(){
  const recebido = parseFloat(document.getElementById("jud-recebido")?.value)||0;
  const total = judItens.reduce((s,i)=>s+i.preco*i.qtd, 0);
  if(!judPaciente.nome || !judPaciente.cpf){
    alert("Preencha o nome e CPF do paciente.");return;
  }
  if(recebido < total){
    alert(`Valor recebido (${fmt(recebido)}) é menor que o total (${fmt(total)}). Verifique.`);return;
  }
  const troco = recebido - total;
  const historico = JSON.parse(localStorage.getItem("jud_historico")||"[]");
  historico.push({
    paciente: judPaciente.nome, cpf: judPaciente.cpf,
    processo: judPaciente.processo,
    data: new Date().toLocaleDateString("pt-BR"),
    itens: judItens.length, total, status: "vendido",
    medicamentos: judItens,
  });
  localStorage.setItem("jud_historico", JSON.stringify(historico));
  alert(`✅ Venda judicial registrada!\n\nTotal: ${fmt(total)}\nRecebido: ${fmt(recebido)}\nTroco: ${fmt(troco)}\n\nA venda foi registrada como "Venda Judicial" no financeiro.`);
  judItens = [];
  judPaciente = {nome:"", cpf:"", processo:"", vara:"Vara da Fazenda Pública — Itaperuna/RJ", validade:30};
  judEtapa = "historico";
  renderContent();
};
