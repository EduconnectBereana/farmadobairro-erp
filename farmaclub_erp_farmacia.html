<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FarmaClub — ERP Farmácia</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f4f4f2;color:#1a1a1a;font-size:14px;display:flex;min-height:100vh}
button,input,select,textarea{font-family:inherit}
input,select,textarea{background:#fff;color:#1a1a1a;border:1px solid #ddd;border-radius:7px;padding:7px 10px;font-size:12px;width:100%}
input:focus,select:focus{outline:none;border-color:#3BAA35}
#sidebar{width:175px;background:#fff;border-right:1px solid #e8e8e8;padding:18px 10px;display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo-title{font-size:14px;font-weight:700;color:#3BAA35;padding:0 8px}
.logo-sub{font-size:10px;color:#aaa;padding:0 8px;margin-top:2px;margin-bottom:18px;line-height:1.5}
.nav-sec{font-size:10px;color:#bbb;font-weight:600;letter-spacing:.6px;padding:10px 10px 4px;text-transform:uppercase}
.nav-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;border-radius:8px;border:none;border-left:3px solid transparent;background:transparent;color:#666;font-size:12px;text-align:left;cursor:pointer;margin-bottom:2px;transition:all .12s}
.nav-btn:hover{background:#f5f5f5}
.nav-btn.ativo{background:#3BAA35;color:#fff;border-left-color:#3BAA35}
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#topbar{padding:12px 20px;background:#fff;border-bottom:1px solid #e8e8e8;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
#content{padding:20px;flex:1;overflow:auto}
.card{background:#fff;border-radius:12px;border:1px solid #e8e8e8;padding:16px}
.kpi{background:#f8f8f8;border-radius:10px;padding:14px 16px}
.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:18px}
.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:18px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.tbl-wrap{border:1px solid #e8e8e8;border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:9px 12px;color:#888;font-weight:500;font-size:11px;background:#f8f8f8;border-bottom:1px solid #eee;white-space:nowrap}
td{padding:8px 12px;font-size:12px;border-bottom:1px solid #f5f5f5}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600}
.btn-pri{padding:7px 14px;background:#3BAA35;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
.btn-sec{padding:7px 14px;background:#fff;border:1px solid #ddd;border-radius:8px;font-size:12px;color:#555;cursor:pointer}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:6px;border:none;cursor:pointer;font-weight:500}
.prog-wrap{height:4px;background:#eee;border-radius:2px;overflow:hidden;margin-top:4px}
.prog-bar{height:100%;border-radius:2px}
.alert{border-radius:10px;padding:11px 14px;margin-bottom:12px;font-size:12px}
.qty-ctrl{display:flex;align-items:center;gap:6px}
.qty-btn{width:24px;height:24px;border:1px solid #ddd;border-radius:5px;background:#f5f5f5;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;line-height:1}
</style>
</head>
<body>
<div id="sidebar">
  <div class="logo-title">ERP Farmácia</div>
  <div class="logo-sub" id="sidebar-farm-nome">Farmácia São João<br>FarmaClub</div>
  <div class="nav-sec">Operação</div>
  <button class="nav-btn ativo" data-tab="dashboard" onclick="setTab('dashboard')"><span style="font-size:10px">▣</span> Dashboard</button>
  <button class="nav-btn" data-tab="pdv" onclick="setTab('pdv')"><span style="font-size:10px">◉</span> PDV / Vendas</button>
  <button class="nav-btn" data-tab="estoque" onclick="setTab('estoque')"><span style="font-size:10px">◈</span> Estoque</button>
  <button class="nav-btn" data-tab="precificacao" onclick="setTab('precificacao')"><span style="font-size:10px">◆</span> Precificação</button>
  <div class="nav-sec">Fiscal</div>
  <button class="nav-btn" data-tab="nfe" onclick="setTab('nfe')"><span style="font-size:10px">◷</span> Entrada NF</button>
  <button class="nav-btn" data-tab="financeiro" onclick="setTab('financeiro')"><span style="font-size:10px">◧</span> Financeiro</button>
  <div class="nav-sec">Gestão</div>
  <button class="nav-btn" data-tab="clientes" onclick="setTab('clientes')"><span style="font-size:10px">◑</span> Clientes</button>
  <button class="nav-btn" data-tab="relatorios" onclick="setTab('relatorios')"><span style="font-size:10px">★</span> Relatórios</button>
  <div class="nav-sec" style="color:#1A5FA8;margin-top:4px">⚖ Judicial</div>
  <button class="nav-btn" data-tab="judicial" onclick="setTab('judicial')" style="border-left-color:#1A5FA8"><span style="font-size:10px">📋</span> Orçamento Judicial</button>
  <div class="nav-sec" style="color:#E03A3A;margin-top:4px">🎯 Campanhas</div>
  <button class="nav-btn" data-tab="campanhas" onclick="setTab('campanhas')" style="border-left-color:#E03A3A;color:#E03A3A;font-weight:600"><span style="font-size:10px">📢</span> Campanhas</button>
  <div class="nav-sec" style="color:#d97706;margin-top:4px">🛒 Reposição</div>
  <button class="nav-btn" data-tab="pedido_reposicao" onclick="setTab('pedido_reposicao')" style="border-left-color:#d97706;color:#d97706;font-weight:600"><span style="font-size:10px">📤</span> Pedir à Central</button>
  <div style="margin-top:auto;padding-top:12px;border-top:1px solid #eee;font-size:10px;color:#aaa;padding-left:8px;line-height:1.8">
    <span style="color:#3BAA35">●</span> FarmaClub: online<br>
    CNPJ: 12.345.678/0001-90<br>
    CRF-RJ 12345
  </div>
</div>
<div id="main">
  <div id="topbar">
    <div>
      <div id="tab-title" style="font-weight:600;font-size:14px">Dashboard</div>
      <div style="font-size:11px;color:#aaa">Farmácia São João · Centro · 16/03/2026</div>
    </div>
    <div style="font-size:11px;color:#888">16/03/2026</div>
  </div>
  <div id="topbar-info" style="display:flex;align-items:center;gap:8px;padding:8px 16px;background:#f0fdf4;border-bottom:1px solid #bbf7d0;font-size:12px">
  <span style="color:#3BAA35;font-weight:600">🏥 <span id="farm-nome-logada">Carregando...</span></span>
  <span id="farm-badge-offline" style="display:none;background:#fffbeb;color:#d97706;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600">DEMO</span>
  <span style="color:#9a9eb8">|</span>
  <span style="color:#9a9eb8">ERP Farmácia</span>
  <button onclick="fazerLogout()" style="margin-left:auto;padding:4px 12px;background:transparent;border:1px solid #e0e0e0;border-radius:6px;font-size:11px;cursor:pointer;color:#9a9eb8;font-family:inherit">Sair</button>
</div>
<div id="content"></div>
</div>
<script src="farmaclub_supabase.js"></script>
<script>
const T="#3BAA35",AM="#d97706",RD="#dc2626",GN="#16a34a",BL="#2563eb",PU="#7c3aed";
const fmt=v=>v.toLocaleString("pt-BR",{style:"currency",currency:"BRL",minimumFractionDigits:2});
const fmtD=s=>new Date(s+"T12:00").toLocaleDateString("pt-BR");
const diasP=s=>Math.round((new Date(s+"T12:00")-new Date())/86400000);

const produtos=[
  {id:1,codigo:"7896004004532",nome:"Dipirona 500mg 20cp",categoria:"Analgesicos",fabricante:"EMS",validade:"2027-06",estoque:84,estoqueMin:20,custo:4.20,preco:8.90,margem:112,receita:false,curva:"A"},
  {id:2,codigo:"7896714240118",nome:"Amoxicilina 500mg 21cp",categoria:"Antibioticos",fabricante:"Medley",validade:"2026-11",estoque:31,estoqueMin:15,custo:9.80,preco:22.50,margem:130,receita:true,curva:"A"},
  {id:3,codigo:"7896523240065",nome:"Omeprazol 20mg 28cp",categoria:"Gastro",fabricante:"Aché",validade:"2027-08",estoque:55,estoqueMin:20,custo:5.60,preco:14.90,margem:166,receita:false,curva:"A"},
  {id:4,codigo:"7891058006824",nome:"Vitamina C 1g 10cp",categoria:"Vitaminas",fabricante:"EMS",validade:"2027-12",estoque:102,estoqueMin:30,custo:2.10,preco:5.90,margem:181,receita:false,curva:"A"},
  {id:5,codigo:"7896658010077",nome:"Losartana 50mg 30cp",categoria:"Cardiovasc.",fabricante:"EMS",validade:"2026-09",estoque:12,estoqueMin:20,custo:7.20,preco:18.50,margem:157,receita:true,curva:"A"},
  {id:6,codigo:"7891047944513",nome:"Metformina 850mg 30cp",categoria:"Diabetes",fabricante:"Merck",validade:"2027-01",estoque:44,estoqueMin:15,custo:3.80,preco:9.90,margem:161,receita:true,curva:"B"},
  {id:7,codigo:"7896714270048",nome:"Ibuprofeno 600mg 20cp",categoria:"Anti-inflam.",fabricante:"Medley",validade:"2027-05",estoque:67,estoqueMin:25,custo:6.10,preco:15.90,margem:161,receita:false,curva:"A"},
  {id:8,codigo:"7896523405055",nome:"Simeticona 40mg 50cp",categoria:"Gastro",fabricante:"Aché",validade:"2028-02",estoque:29,estoqueMin:10,custo:4.90,preco:11.50,margem:135,receita:false,curva:"B"},
];

const contasPagar=[
  {credor:"Distribuidora Farmanobre",venc:"2026-03-20",valor:4820,status:"pendente",tipo:"fornecedor"},
  {credor:"Aluguel — Proprietário",venc:"2026-03-25",valor:2800,status:"pendente",tipo:"aluguel"},
  {credor:"FarmaClub — Comissão 10%",venc:"2026-03-31",valor:876,status:"pendente",tipo:"comissão"},
  {credor:"Distribuidora EMS",venc:"2026-03-15",valor:1240,status:"pago",tipo:"fornecedor"},
];

let vendaItens=[];

const kpi=(l,v,s,a)=>`<div class="kpi"><div style="font-size:11px;color:#888;margin-bottom:5px">${l}</div><div style="font-size:20px;font-weight:700;color:${a||"#1a1a1a"}">${v}</div>${s?`<div style="font-size:11px;color:#aaa;margin-top:3px">${s}</div>`:""}</div>`;
const dot=(s)=>{const c={pendente:AM,pago:GN,critico:RD,baixo:AM,ok:GN};return`<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:6px;height:6px;border-radius:50%;background:${c[s]||"#999"}"></span><span style="font-size:11px;color:#666">${s}</span></span>`;};
const badge=(t,c)=>`<span class="badge" style="background:${c}22;color:${c}">${t}</span>`;
const th=ls=>ls.map(h=>`<th>${h}</th>`).join("");
const td=(c,e="")=>`<td style="${e}">${c}</td>`;
const tbl=(cols,rows)=>`<div class="tbl-wrap"><table><thead style="background:#f8f8f8"><tr>${th(cols)}</tr></thead><tbody>${rows}</tbody></table></div>`;

function renderDashboard(){
  const criticos=produtos.filter(p=>p.estoque<=p.estoqueMin).length;
  const vendasHoje=3420.50;
  return`
    <div class="grid4">
      ${kpi("Vendas de hoje",fmt(vendasHoje),"↑ 18% vs ontem",T)}
      ${kpi("Receita do mês",fmt(87600),"Março/2026")}
      ${kpi("Estoque crítico",criticos+" produtos","abaixo do mínimo",RD)}
      ${kpi("A pagar",fmt(contasPagar.filter(c=>c.status==="pendente").reduce((s,c)=>s+c.valor,0)),"contas em aberto",AM)}
    </div>
    <div class="grid2">
      <div class="card">
        <div style="font-size:13px;font-weight:600;margin-bottom:12px">Vendas — últimos 7 dias</div>
        <div style="position:relative;height:160px"><canvas id="chtV"></canvas></div>
      </div>
      <div class="card">
        <div style="font-size:13px;font-weight:600;margin-bottom:10px">Alertas</div>
        ${criticos>0?`<div class="alert" style="background:#fef2f2;border-left:3px solid ${RD}"><span style="font-size:12px;color:${RD}"><strong>${criticos} produtos</strong> em estoque crítico — repor urgente</span></div>`:""}
        <div class="alert" style="background:#eff6ff;border-left:3px solid ${BL}"><span style="font-size:12px;color:${BL}">FarmaClub: você está sincronizado · 3 pedidos ativos agora</span></div>
        <div class="alert" style="background:#fffbeb;border-left:3px solid ${AM}"><span style="font-size:12px;color:${AM}">Losartana e Amoxicilina vencem em 60–90 dias</span></div>
      </div>
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:600;margin-bottom:12px">Top produtos — últimos 7 dias</div>
      ${tbl(["#","Produto","Vendas","Receita"],
        produtos.sort((a,b)=>b.estoque-a.estoque).slice(0,5).map((p,i)=>`<tr>
          ${td(`<span style="color:${T};font-weight:600">#${i+1}</span>`)}${td(p.nome)}${td(Math.floor(Math.random()*40+10)+" un","text-align:center")}${td(fmt(p.preco*Math.floor(Math.random()*40+10)),"text-align:right;font-weight:600")}
        </tr>`).join(""))}
    </div>`;
}

function renderPDV(){
  const total=vendaItens.reduce((s,i)=>s+i.preco*i.qtd,0);
  return`
    <div style="display:grid;grid-template-columns:1fr 300px;gap:16px">
      <div>
        <div class="card" style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div style="font-size:12px;font-weight:600">Buscar produto</div><button onclick="setTab('judicial')" style="font-size:11px;padding:5px 10px;background:#1A5FA8;color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:inherit">⚖ Orçamento Judicial</button></div>
          <input id="buscaPDV" type="text" placeholder="Nome ou código EAN..." onkeyup="pdvBusca(this.value)">
          <div id="pdvRes" style="margin-top:10px;display:grid;gap:6px"></div>
        </div>
        <div class="card">
          <div style="font-size:12px;font-weight:600;margin-bottom:10px">Últimas vendas</div>
          ${tbl(["Venda","Horário","Total","Forma"],
            [["V4521","14:32","R$ 91,00","Débito"],["V4520","13:58","R$ 46,00","Pix"],["V4519","13:22","R$ 156,30","Crédito"]].map(([id,h,t,f])=>`<tr>
              ${td(`<span style="color:${T};font-weight:600">${id}</span>`)}${td(h)}${td(`<strong>${t}</strong>`)}${td(f,"color:#888")}
            </tr>`).join(""))}
        </div>
      </div>
      <div class="card" style="position:sticky;top:0;height:fit-content">
        <div style="font-size:13px;font-weight:600;margin-bottom:12px">Carrinho</div>
        <div style="min-height:100px">
          ${vendaItens.length===0?`<div style="text-align:center;padding:24px;color:#aaa;font-size:12px">Nenhum item</div>`
            :`<table style="width:100%;border-collapse:collapse">${vendaItens.map((i,idx)=>`<tr><td style="font-size:12px;padding:6px 0;border-bottom:1px solid #f5f5f5">${i.nome}</td><td style="text-align:right;font-size:12px;font-weight:600">${fmt(i.preco*i.qtd)}</td><td style="text-align:center"><button onclick="remPDV(${idx})" style="background:transparent;border:none;color:${RD};cursor:pointer">✕</button></td></tr>`).join("")}</table>`}
        </div>
        <div style="border-top:1px solid #eee;padding-top:10px;margin-top:10px">
          <div style="display:flex;justify-content:space-between;margin-bottom:10px">
            <span style="font-size:13px;font-weight:600">Total</span>
            <span style="font-size:18px;font-weight:700;color:${T}">${fmt(total)}</span>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">
            ${["Dinheiro","Pix","Débito","Crédito"].map(f=>`<button onclick="selForma(this)" style="padding:7px;border:1px solid #ddd;border-radius:7px;background:transparent;color:#666;font-size:12px;cursor:pointer">${f}</button>`).join("")}
          </div>
          <button onclick="finalizarVenda()" style="width:100%;padding:10px;background:${T};color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:13px">Finalizar Venda</button>
          <button onclick="vendaItens=[];renderContent()" style="width:100%;padding:8px;margin-top:6px;background:transparent;border:1px solid #ddd;border-radius:8px;color:#888;font-size:12px;cursor:pointer">Limpar</button>
        </div>
      </div>
    </div>`;
}

function renderEstoque(){
  const criticos=produtos.filter(p=>p.estoque<=p.estoqueMin);
  return`
    <div class="grid4" style="margin-bottom:14px">
      ${kpi("Total de produtos",produtos.length,"ativos")}
      ${kpi("Estoque crítico",criticos.length,"abaixo do mínimo",RD)}
      ${kpi("Vencendo 60 dias",produtos.filter(p=>{const d=diasP(p.validade);return d>=0&&d<=60}).length,"revisar",AM)}
      ${kpi("Curva A",produtos.filter(p=>p.curva==="A").length,"prioritários",T)}
    </div>
    ${criticos.length>0?`<div class="alert" style="background:#fef2f2;border:1px solid #fecaca;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-radius:10px;margin-bottom:14px">
      <span style="font-size:12px;color:${RD}"><strong>${criticos.length} produtos abaixo do mínimo:</strong> ${criticos.map(p=>p.nome.split(" ")[0]).join(", ")}</span>
      <button class="btn-pri" style="background:${RD};flex-shrink:0">Gerar pedido</button>
    </div>`:""}
    ${tbl(["Código","Produto","Categoria","Qtd","Mín","Validade","Tarja",""],
      produtos.map((p,i)=>{
        const st=p.estoque<=p.estoqueMin?"critico":p.estoque<=p.estoqueMin*1.5?"baixo":"ok";
        return`<tr>
          ${td(`<span style="font-size:10px;color:#aaa;font-family:monospace">${p.codigo}</span>`)}
          ${td(`<strong style="font-size:12px">${p.nome}</strong><div style="font-size:10px;color:#aaa">${p.fabricante}</div>`)}
          ${td(badge(p.categoria,"#6b7280"))}
          ${td(`<span style="font-weight:700;color:${st==="critico"?RD:st==="baixo"?AM:"#1a1a1a"}">${p.estoque}</span>`,"text-align:center")}
          ${td(p.estoqueMin,"text-align:center;color:#aaa")}
          ${td(fmtD(p.validade),"color:#888")}
          ${td(p.receita?badge("Receita",BL):"—")}
          ${td(`<button class="btn-sm" style="background:#f5f5f5;color:#555" onclick="alert('Estoque de '+${JSON.stringify(p.nome)}+': ajuste manual')">Ajustar</button>`)}
        </tr>`;}).join(""))}`;
}

    simples: 6.0,   // Simples Anexo III serviços
    desc: "Sem ICMS · ISS municipal · Simples Anexo III",
    margem_min: 50,
  },
};

// Calcular imposto real e preço mínimo
function calcTributo(custo, categoria, margem_desejada) {
  const t = TRIBUTOS[categoria] || TRIBUTOS["mip"];
  // No Simples, o imposto já está incluído no DAS sobre o faturamento
  // Imposto real embutido no preço = alíquota Simples + carga específica
  const carga_total = t.simples + (t.icms > 0 ? t.icms * 0.15 : 0); // ICMS parcialmente embutido
  const preco_sem_margem = custo / (1 - carga_total/100);
  const preco_com_margem = custo * (1 + margem_desejada/100);
  const preco_minimo = Math.max(preco_sem_margem, custo * 1.10); // mínimo 10% acima do custo
  const margem_real = ((preco_com_margem - custo) / preco_com_margem * 100);
  const imposto_embutido = preco_com_margem * carga_total / 100;
  const lucro_liquido = preco_com_margem - custo - imposto_embutido;
  return {
    preco_sugerido: +preco_com_margem.toFixed(2),
    preco_minimo: +preco_minimo.toFixed(2),
    margem_real: +margem_real.toFixed(1),
    imposto_embutido: +imposto_embutido.toFixed(2),
    lucro_liquido: +lucro_liquido.toFixed(2),
    carga_total: +carga_total.toFixed(1),
  };
}

// Parser de XML NF-e (padrão SEFAZ)
function parsearNFe(xmlText) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlText, "text/xml");
  const err = doc.querySelector("parsererror");
  if(err) throw new Error("XML inválido — verifique se é um arquivo de NF-e.");

  const get = (el, tag) => el?.querySelector(tag)?.textContent?.trim() || "";
  const getAll = (el, tag) => [...(el?.querySelectorAll(tag)||[])];

  const nfe = doc.querySelector("NFe, nfeProc");
  const infNFe = doc.querySelector("infNFe");
  if(!infNFe) throw new Error("Não é um XML de NF-e válido. Verifique o arquivo.");

  // Emitente
  const emit = doc.querySelector("emit");
  const fornecedor = {
    nome:  get(emit,"xNome") || get(emit,"xFant") || "Fornecedor",
    cnpj:  get(emit,"CNPJ"),
    uf:    get(emit,"UF"),
  };

  // Cabeçalho da NF
  const ide = doc.querySelector("ide");
  const total = doc.querySelector("total ICMSTot, ICMSTot");
  const cobr = doc.querySelector("cobr");
  const dup = doc.querySelector("dup");

  const cabecalho = {
    numero:    get(ide,"nNF"),
    serie:     get(ide,"serie"),
    emissao:   get(ide,"dhEmi") || get(ide,"dEmi"),
    chave:     infNFe.getAttribute("Id")?.replace("NFe","") || "",
    valorTotal: parseFloat(get(total,"vNF")||"0"),
    valorProd:  parseFloat(get(total,"vProd")||"0"),
    frete:      parseFloat(get(total,"vFrete")||"0"),
    desconto:   parseFloat(get(total,"vDesc")||"0"),
    vencimento: get(dup,"dVenc") || "",
  };

  // Itens
  const dets = getAll(doc,"det");
  const itens = dets.map(det => {
    const prod = det.querySelector("prod");
    const imposto = det.querySelector("ICMS");
    const qtd  = parseFloat(get(prod,"qCom")||"0");
    const vUnit = parseFloat(get(prod,"vUnCom")||"0");
    return {
      seq:       det.getAttribute("nItem"),
      ean:       get(prod,"cEAN")||get(prod,"cProd"),
      codigo:    get(prod,"cProd"),
      nome:      get(prod,"xProd"),
      ncm:       get(prod,"NCM"),
      cfop:      get(prod,"CFOP"),
      unidade:   get(prod,"uCom"),
      qtd,
      vUnit,
      vTotal:    parseFloat(get(prod,"vProd")||"0"),
      // Cruzar com catálogo depois
      match:     null,
      precoVenda: 0,
      lote:      "",
      validade:  "",
    };
  });

  return { fornecedor, cabecalho, itens };
}

window.processarXML = function(file) {
  if(!file) return;
  if(!file.name.endsWith(".xml") && file.type !== "text/xml") {
    mostrarMsgNFe("❌ Selecione um arquivo .xml de NF-e.", "err");
    return;
  }
  mostrarMsgNFe("⏳ Lendo arquivo...", "info");
  const reader = new FileReader();
  reader.onload = e => {
    try {
      nfeDados = parsearNFe(e.target.result);
      nfeItens = cruzarComCatalogo(nfeDados.itens);
      nfeEtapa = "revisao";
      renderContent();
    } catch(err) {
      mostrarMsgNFe("❌ " + err.message, "err");
    }
  };
  reader.readAsText(file, "UTF-8");
};

function mostrarMsgNFe(txt, tipo) {

  const estilos = {
    ok:   {bg:"#f0fdf4",cor:"#16a34a",brd:"#bbf7d0"},

    info: {bg:"#eff6ff",cor:"#1d4ed8",brd:"#bfdbfe"},

window.confirmarEntradaNF = function(){
  if(!nfeDados||!nfeItens.length) return;

  // 1. Atualizar estoque no localStorage (integração Supabase feita em background)
  const estoque = JSON.parse(localStorage.getItem("fc_estoque_farm")||"{}");
  nfeItens.forEach(item => {
    const key = item.match ? item.match.id : ("novo_"+item.ean);
    estoque[key] = {
      id: key,
      ean: item.ean,
      nome: item.match ? item.match.nome : item.nome,
      ico: item.match?.ico || "💊",
      qtd: (estoque[key]?.qtd||0) + item.qtd,
      preco: item.precoVenda,
      custo: item.vUnit,
      lote: item.lote,
      validade: item.validade,
      lab: item.match?.lab || "",
      cat: item.match?.cat || "outros",
    };
  });
  localStorage.setItem("fc_estoque_farm", JSON.stringify(estoque));

  // 2. Lançar conta a pagar
  const venc = document.getElementById("nfe-venc")?.value || "";
  const contas = JSON.parse(localStorage.getItem("fc_contas_pagar")||"[]");
  contas.push({
    id: Date.now(),
    credor: nfeDados.fornecedor.nome,
    descricao: `NF-e nº ${nfeDados.cabecalho.numero}`,
    valor: nfeDados.cabecalho.valorTotal,
    vencimento: venc,
    status: "pendente",
    nf: nfeDados.cabecalho.numero,
    lancarEm: new Date().toLocaleDateString("pt-BR"),
  });
  localStorage.setItem("fc_contas_pagar", JSON.stringify(contas));

  // 3. Supabase em background
  if(typeof sb!=="undefined"&&SUPABASE_ANON!=="COLE_AQUI_SUA_CHAVE_ANON_PUBLIC"){
    const farmId = FC?.getFarmaciaLogada()?.id || 1;
    nfeItens.forEach(async item => {
      if(item.match?.id){
        try {
          const {data:ex} = await sb.from("estoque").eq("farmacia_id",farmId).eq("produto_id",item.match.id).single();
          if(ex){ await sb.from("estoque").eq("id",ex.id).update({quantidade:ex.quantidade+item.qtd,lote:item.lote||ex.lote,validade:item.validade||ex.validade,updated_at:new Date().toISOString()}); }
          else { await sb.from("estoque").insert({farmacia_id:farmId,produto_id:item.match.id,quantidade:item.qtd,lote:item.lote,validade:item.validade||null,quantidade_min:5}); }
          // Atualizar preço
          await sb.from("produtos").eq("id",item.match.id).update({preco_venda:item.precoVenda,preco_pix:item.precoVenda,preco_custo:item.vUnit,updated_at:new Date().toISOString()});
        } catch(e){ console.warn("Supabase estoque:", e.message); }
      }
    });
  }

  nfeEtapa = "concluido";
  renderContent();
};

window.pdvBusca=function(q){

  const found=produtos.filter(p=>p.nome.toLowerCase().includes(q.toLowerCase())||p.codigo.includes(q));
  res.innerHTML=found.slice(0,5).map(p=>`

};

window.addPDV=function(id){
  const p=produtos.find(x=>x.id===id);if(!p) return;
  const ex=vendaItens.find(x=>x.id===id);
  if(ex)ex.qtd++;else vendaItens.push({...p,qtd:1});
  renderContent();
  setTimeout(()=>{const el=document.getElementById("buscaPDV");if(el)el.focus();},50);
};
window.remPDV=function(i){vendaItens.splice(i,1);renderContent();};
window.selForma=function(btn){
  document.querySelectorAll("#content .qty-ctrl ~ button, .card button[onclick='selForma(this)']").forEach(b=>{b.style.background="transparent";b.style.color="#666";});
  btn.style.background="#3BAA35";btn.style.color="#fff";
};
window.finalizarVenda=function(){
  if(!vendaItens.length){alert("Adicione produtos ao carrinho.");return;}
  alert("Venda finalizada! Total: "+fmt(vendaItens.reduce((s,i)=>s+i.preco*i.qtd,0)));
  vendaItens=[];renderContent();
};

window.judAdicionarMed = function(idx){
  const m = MED_JUDICIAIS[idx];
  const ex = judItens.findIndex(i=>i.cod===m.cod);
  if(ex>=0){ judItens[ex].qtd++; }
  else { judItens.push({...m, qtd:1}); }
  const ac = document.getElementById("jud-ac");
  if(ac) ac.style.display="none";
  const inp = document.getElementById("jud-busca");
  if(inp) inp.value="";
  renderContent();
};

window.judFinalizarVenda = function(){
  const recebido = parseFloat(document.getElementById("jud-recebido")?.value)||0;
  const total = judItens.reduce((s,i)=>s+i.preco*i.qtd, 0);
  if(!judPaciente.nome || !judPaciente.cpf){
    alert("Preencha o nome e CPF do paciente.");return;
  }
  if(recebido < total){
    alert(`Valor recebido (${fmt(recebido)}) é menor que o total (${fmt(total)}). Verifique.`);return;
  }
  const troco = recebido - total;
  const historico = JSON.parse(localStorage.getItem("jud_historico")||"[]");
  historico.push({
    paciente: judPaciente.nome, cpf: judPaciente.cpf,
    processo: judPaciente.processo,
    data: new Date().toLocaleDateString("pt-BR"),
    itens: judItens.length, total, status: "vendido",
    medicamentos: judItens,
  });
  localStorage.setItem("jud_historico", JSON.stringify(historico));
  alert(`✅ Venda judicial registrada!\n\nTotal: ${fmt(total)}\nRecebido: ${fmt(recebido)}\nTroco: ${fmt(troco)}\n\nA venda foi registrada como "Venda Judicial" no financeiro.`);
  judItens = [];
  judPaciente = {nome:"", cpf:"", processo:"", vara:"Vara da Fazenda Pública — Itaperuna/RJ", validade:30};
  judEtapa = "historico";
  renderContent();
};

    const estAtual = meuEstoque[p.id]||0;
    const deficit = Math.max(0, ESTOQUE_IDEAL - estAtual);
    if(deficit <= 0) return; // estoque OK, não sugere
    const mult = getSazMult(p.categoria);
    const qtdSugerida = Math.ceil(deficit * mult);
    repItens.push({
      produto_id: p.id,
      nome: p.nome,
      categoria: p.categoria,
      fabricante: p.fabricante,
      custo: p.custo,
      estAtual,
      qtdSugerida,
      qtdFinal: qtdSugerida,
      aceito: true,
      trocado: false,
      obs: ""
    });
  });
  // Ordenar: críticos primeiro
  repItens.sort((a,b)=>a.estAtual-b.estAtual);
  repGerado = true;
}

const categorias = [...new Set(catalogoCentral.map(p=>p.categoria))];

// HELPERS REPOSIÇÃO
let trocaIdx = -1;

window.repAdj = function(idx,delta){
  repItens[idx].qtdFinal = Math.max(0,(repItens[idx].qtdFinal||0)+delta);
  if(repItens[idx].qtdFinal===0) repItens[idx].aceito=false;
  renderContent();
};

window.repToggle = function(idx){
  repItens[idx].aceito = !repItens[idx].aceito;
  if(repItens[idx].aceito && repItens[idx].qtdFinal===0)
    repItens[idx].qtdFinal = repItens[idx].qtdSugerida;
  renderContent();
};

window.repAceitarTodos = function(aceitar){
  repItens.forEach(i=>{ i.aceito=aceitar; if(aceitar&&i.qtdFinal===0) i.qtdFinal=i.qtdSugerida; });
  renderContent();
};

window.repAdicionarExtra = function(prodId){
  const p = catalogoCentral.find(x=>x.id===prodId);
  if(!p) return;
  const ex = repItens.find(x=>x.produto_id===prodId);
  if(ex){ ex.aceito=true; }
  else {
    repItens.push({
      produto_id:prodId, nome:p.nome, categoria:p.categoria,
      fabricante:p.fabricante, custo:p.custo, estAtual:meuEstoque[prodId]||0,
      qtdSugerida:20, qtdFinal:20, aceito:true, trocado:false, obs:""
    });
  }
  renderContent();
};

window.abrirTroca = function(idx){
  trocaIdx = idx;
  const modal = document.getElementById("modal-troca");
  if(modal){ modal.style.display="block"; filtrarTroca(""); }
};

window.filtrarTroca = function(q){
  const cat = document.getElementById("troca-cat")?.value||"";
  const res = catalogoCentral.filter(p=>{
    const bOk = q===""||p.nome.toLowerCase().includes(q.toLowerCase());
    const cOk = cat===""||p.categoria===cat;
    return bOk&&cOk;
  }).slice(0,10);
  const lista = document.getElementById("troca-lista");
  if(!lista) return;
  lista.innerHTML = res.map(p=>`
    <div onclick="confirmarTroca(${p.id},'${p.nome.replace(/'/g,"")}')"
      style="padding:10px 12px;cursor:pointer;border-bottom:1px solid #f5f5f5;font-size:12px"
      onmouseover="this.style.background='#fffbeb'" onmouseout="this.style.background=''">
      <div style="font-weight:500">${p.nome}</div>
      <div style="font-size:10px;color:#888">${p.categoria} · ${fmt(p.custo)}</div>
    </div>`).join("");
};

window.confirmarTroca = function(prodId, prodNome){
  if(trocaIdx < 0) return;
  const novoProd = catalogoCentral.find(p=>p.id===prodId);
  if(!novoProd) return;
  repItens[trocaIdx].trocado = true;
  repItens[trocaIdx].trocadoPor = prodNome;
  repItens[trocaIdx].produto_id_original = repItens[trocaIdx].produto_id;
  repItens[trocaIdx].produto_id = prodId;
  repItens[trocaIdx].nome = novoProd.nome;
  repItens[trocaIdx].custo = novoProd.custo;
  repItens[trocaIdx].fabricante = novoProd.fabricante;
  repItens[trocaIdx].aceito = true;
  const modal = document.getElementById("modal-troca");
  if(modal) modal.style.display = "none";
  trocaIdx = -1;
  renderContent();
};

window.enviarPedido = function(){
  const aceitos = repItens.filter(i=>i.aceito);
  if(!aceitos.length){ alert("Nenhum produto selecionado."); return; }
  const confirmMsg = `Confirmar envio de ${aceitos.length} produto(s) à Central FarmaClub?\n\nTotal estimado: ${fmt(aceitos.reduce((s,i)=>s+i.qtdFinal*i.custo,0))}`;
  if(!confirm(confirmMsg)) return;
  // Salvar pedido no localStorage (simulado)
  const pedidos = JSON.parse(localStorage.getItem("rep_pedidos")||"[]");
  pedidos.push({
    data: new Date().toLocaleDateString("pt-BR"),
    farmacia: "Farmácia São João",
    itens: aceitos,
    total: aceitos.reduce((s,i)=>s+i.qtdFinal*i.custo,0),
    status: "aguardando_central"
  });
  localStorage.setItem("rep_pedidos", JSON.stringify(pedidos));
  repEtapa = "enviado";
  renderContent();
};

function salvarCampanhas(c){
  localStorage.setItem("fc_campanhas",JSON.stringify(c));
}

function validarPrecoAcimaCusto(custo, precoFinal){
  return parseFloat(precoFinal) >= parseFloat(custo);
}

function diasRestantes(dataFim){
  const diff = new Date(dataFim) - new Date();
  return Math.max(0, Math.ceil(diff/(1000*60*60*24)));

function dataMaxNovidade(){
  const d = new Date();

window.atualizarKitItem = function(idx, sel){
  if(!campForm.kitItens) campForm.kitItens=[];
  campForm.kitItens[idx] = {
    nome:  sel.value,
    custo: parseFloat(sel.selectedOptions[0]?.dataset?.custo)||0,
    preco: parseFloat(sel.selectedOptions[0]?.dataset?.preco)||0,
  };
  const custoTotal = (campForm.kitItens||[]).reduce((s,i)=>s+(i.custo||0),0);
  campForm.custoKit = custoTotal;
  const el = document.getElementById("kit-custo");
  if(el) el.textContent = fmt(custoTotal);
};

window.adicionarKitItem = function(){
  const container = document.getElementById("kit-itens");
  if(!container) return;
  const idx = container.children.length;
  const div = document.createElement("div");
  div.style.cssText = "display:flex;gap:8px;margin-bottom:6px";
  div.innerHTML = `<select onchange="atualizarKitItem(${idx},this)" style="flex:1;padding:9px;border:1px solid #ddd;border-radius:8px;font-size:12px">
    <option value="">Produto ${idx+1}</option>
    ${produtos.map(p=>`<option value="${p.nome}" data-custo="${p.custo}" data-preco="${p.preco}">${p.nome}</option>`).join("")}
  </select>`;
  container.appendChild(div);
};

window.validarKitPreco = function(){
  const aviso = document.getElementById("kit-aviso");
  if(!aviso) return;
  const custo = campForm.custoKit||0;
  const preco = campForm.precoKit||0;
  if(preco>0 && preco<custo){
    aviso.innerHTML = `<span style="color:#dc2626">⚠️ Preço do kit (${fmt(preco)}) está abaixo do custo total (${fmt(custo)}). Ajuste para evitar prejuízo.</span>`;
  } else if(preco>=custo&&preco>0){
    aviso.innerHTML = `<span style="color:#16a34a">✓ Margem do kit: ${fmt(preco-custo)} (${((preco-custo)/preco*100).toFixed(1)}%)</span>`;
  }
};

window.atualizarPreviewProg = function(){
  const el = document.getElementById("prog-preview");
  const av = document.getElementById("prog-aviso");
  if(!el) return;
  const custo = campForm.custoProd||0;
  const preco = campForm.precoProd||0;
  const qtd   = campForm.qtdMin||2;
  const pct   = campForm.desconto||30;
  if(!campForm.produto){el.textContent="Selecione o produto para ver a prévia";return;}
  const precoDesc = +(preco*(1-pct/100)).toFixed(2);
  const totalSem  = preco*qtd;
  const totalCom  = preco*(qtd-1)+precoDesc;
  const economia  = totalSem-totalCom;

  if(precoDesc < custo){
    if(av) av.innerHTML=`<span style="color:#dc2626">⚠️ Com ${pct}% de desconto, o preço (${fmt(precoDesc)}) fica abaixo do custo (${fmt(custo)}). O sistema ajustará automaticamente o desconto máximo.</span>`;
    // Calcular desconto máximo permitido
    const descontoMax = Math.floor((1-custo/preco)*100);
    if(av) av.innerHTML += ` Desconto máximo permitido: <strong>${descontoMax}%</strong>`;
  } else {
    if(av) av.innerHTML="";
  }

  el.innerHTML = `
    <strong>${campForm.produto}</strong><br>
    Preço normal: ${fmt(preco)} cada<br>
    Leve ${qtd} → ${qtd-1}x ${fmt(preco)} + 1x ${fmt(Math.max(precoDesc,custo))} = <strong style="color:#16a34a">${fmt(Math.min(totalCom,preco*(qtd-1)+custo))}</strong><br>
    Economia do cliente: <strong>${fmt(Math.max(0,economia))}</strong><br>
    Custo unitário: ${fmt(custo)} · Preço com desconto: ${fmt(Math.max(precoDesc,custo))}
    ${precoDesc<custo?`<br><span style="color:#d97706">⚠ Desconto ajustado para proteger sua margem</span>`:""}`;
};

window.salvarCampanha = function(){
  const nome = document.getElementById("c-nome")?.value.trim();
  const desc = document.getElementById("c-desc")?.value.trim();
  const dataIni = document.getElementById("c-ini")?.value || new Date().toISOString().split("T")[0];
  const dataFim = document.getElementById("c-fim")?.value;
  const msgEl = document.getElementById("msg-camp");

  const mostrarErro = msg => {
    if(msgEl){msgEl.textContent=msg;msgEl.style.display="block";}
    else alert(msg);
  };

  if(!nome){mostrarErro("Informe o nome da campanha.");return;}
  if(!dataFim){mostrarErro("Informe a data de encerramento.");return;}
  if(new Date(dataFim)<new Date()){mostrarErro("A data de encerramento deve ser futura.");return;}

  // Validações específicas por tipo
  if(campTipo==="kit"){
    const custo = campForm.custoKit||0;
    const preco = campForm.precoKit||0;
    if(preco<=0){mostrarErro("Informe o preço do kit.");return;}
    if(!validarPrecoAcimaCusto(custo,preco)){
      mostrarErro(`Preço do kit (${fmt(preco)}) está abaixo do custo total (${fmt(custo)}). Ajuste para evitar prejuízo.`);
      return;
    }
  }

  if(campTipo==="progressivo"){
    if(!campForm.produto){mostrarErro("Selecione o produto.");return;}
    const custo = campForm.custoProd||0;
    const preco = campForm.precoProd||0;
    const pct   = campForm.desconto||30;
    const precoDesc = +(preco*(1-pct/100)).toFixed(2);
    if(precoDesc < custo){
      // Ajustar automaticamente para não ter prejuízo
      campForm.desconto = Math.floor((1-custo/preco)*100);
    }
  }

  const nova = {
    id: Date.now(),
    tipo: campTipo,
    nome,
    descricao: desc||"",
    dataIni,
    dataFim,
    farmacia: "Farmácia São João",
    ativa: true,
    criadoEm: new Date().toISOString(),
    // dados por tipo
    produto:  campForm.produto||"",
    itens:    (campForm.kitItens||[]).map(i=>i.nome),
    precoKit: campForm.precoKit||0,
    custoKit: campForm.custoKit||0,
    qtdMin:   campForm.qtdMin||2,
    desconto: campForm.desconto||30,
    custoProd:campForm.custoProd||0,
    precoProd:campForm.precoProd||0,
  };

  const camps = getCampanhas();
  camps.push(nova);
  salvarCampanhas(camps);

  campEtapa = "lista";
  campForm  = {};
  renderContent();
  alert("✅ Campanha publicada! Já aparece no app e no site.");
};

window.encerrarCamp = function(idx){
  if(!confirm("Encerrar esta campanha agora?")) return;
  const camps = getCampanhas();
  const ativas = camps.filter(c=>c.ativa && new Date(c.dataFim)>=new Date());
  ativas[idx].ativa = false;
  salvarCampanhas(camps);
  renderContent();
};

// FASE B — AUTENTICAÇÃO E DADOS REAIS (SUPABASE)
// ══════════════════════════════════════════════════════════

let farmaciaLogada = null;   // objeto da farmácia logada
let modoOffline = false;     // true quando sem conexão com Supabase

// Inicialização: verificar sessão existente
async function inicializar() {
  const session = typeof sb !== "undefined" && sb.auth.getSession();
  if (session) {
    // Sessão ativa — buscar dados da farmácia
    await carregarFarmaciaLogada();
  } else {
    // Sem sessão — mostrar tela de login
    mostrarLogin();
  }
}

async function carregarFarmaciaLogada() {
  // Verificar se é gestor ou farmácia
  const { data: usuario } = await sb.from("usuarios")
    .eq("auth_uid", sb.auth.getUser()?.id || "").single();

  if (!usuario) {
    // Fallback: modo offline com dados simulados
    modoOffline = true;
    farmaciaLogada = FC?.getFarmaciaLogada() || null;
    if (!farmaciaLogada) mostrarLogin();
    else iniciarERP();
    return;
  }

  if (usuario.farmacia_id) {
    const { data: farm } = await sb.from("farmacias").eq("id", usuario.farmacia_id).single();
    farmaciaLogada = farm;
    FC?.setFarmaciaLogada(farm);
  }
  iniciarERP();
}

function mostrarLogin() {
  const content = document.getElementById("content");
  const sidebar = document.getElementById("sidebar");
  const topbar  = document.getElementById("topbar");
  if (sidebar) sidebar.style.display = "none";
  if (topbar)  topbar.style.display  = "none";
  if (content) content.innerHTML = renderLogin();
}

      <div style="text-align:center;margin-bottom:28px">

        <div style="font-size:22px;font-weight:800;color:#1a1a2e">FarmaClub ERP</div>

      </div>

      <div id="login-msg" style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:12px;color:#dc2626;margin-bottom:14px;display:none"></div>

        <label style="font-size:11px;font-weight:600;color:#9a9eb8;display:block;margin-bottom:4px">SENHA</label>
        <div style="position:relative">
          <input type="password" id="lg-senha" placeholder="••••••••" autocomplete="current-password"
            style="width:100%;padding:12px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;outline:none;transition:border-color .15s"

          Entrar em modo demonstração (sem internet)
        </span>
      </div>

      <div style="border-top:1px solid #f0f0f0;margin-top:20px;padding-top:16px;font-size:11px;color:#9a9eb8;text-align:center;line-height:1.6">

window.doLogin = async function() {
  const email = document.getElementById("lg-email")?.value?.trim();
  const senha  = document.getElementById("lg-senha")?.value;
  const btn    = document.getElementById("btn-login");
  const msg    = document.getElementById("login-msg");

  if (!email || !senha) {
    msg.textContent = "Preencha e-mail e senha.";
    msg.style.display = "block";
    return;
  }

  btn.textContent = "Entrando...";
  btn.style.opacity = ".7";

  // Tentar login no Supabase
  if (typeof sb !== "undefined" && sb.auth) {
    const { user, error } = await sb.auth.signIn(email, senha);
    if (user) {
      await carregarFarmaciaLogada();
      return;
    }
    if (error && error.message) {
      // Verificar se é problema de configuração da chave
      if (SUPABASE_ANON === "COLE_AQUI_SUA_CHAVE_ANON_PUBLIC") {
        msg.textContent = "⚠️ Chave Supabase não configurada. Use o modo demonstração.";
        msg.style.display = "block";
        btn.textContent = "Entrar no sistema";
        btn.style.opacity = "1";
        return;
      }
      msg.textContent = error.message === "Invalid login credentials"
        ? "E-mail ou senha incorretos."
        : "Erro: " + error.message;
      msg.style.display = "block";
    }
  } else {
    // Sem Supabase — modo offline
    doLoginOffline();
    return;
  }

  btn.textContent = "Entrar no sistema";
  btn.style.opacity = "1";
};

window.doLoginOffline = function() {
  modoOffline = true;
  farmaciaLogada = { id: 1, nome: "Farmácia São João", bairro: "Centro" };
  FC?.setFarmaciaLogada(farmaciaLogada);
  iniciarERP();
};

function iniciarERP() {
  const sidebar = document.getElementById("sidebar");
  const topbar  = document.getElementById("topbar");
  if (sidebar) sidebar.style.display = "";
  if (topbar)  topbar.style.display  = "";
  if (farmaciaLogada) {
    const el = document.getElementById("farm-nome-logada");
    if (el) el.textContent = farmaciaLogada.nome;
    const el2 = document.getElementById("farm-badge-offline");
    if (el2) el2.style.display = modoOffline ? "inline-block" : "none";
  }
  renderContent();
}

// Logout
window.fazerLogout = async function() {
  if (!confirm("Sair do sistema?")) return;
  if (typeof sb !== "undefined") await sb.auth.signOut();
  farmaciaLogada = null;
  modoOffline = false;
  mostrarLogin();
};


// Patch: carregar dados reais do dashboard via Supabase
async function carregarDadosDashboard() {
  if (modoOffline || typeof sb === "undefined") return null;
  const fid = farmaciaLogada?.id;
  if (!fid) return null;
  try {
    const [pedRes, estRes] = await Promise.all([
      sb.from("pedidos").eq("farmacia_id", fid).order("created_at", false).limit(20).get(),
      sb.from("estoque").eq("farmacia_id", fid).get(),
    ]);
    return {
      pedidos: pedRes.data || [],
      estoque: estRes.data || [],
    };
  } catch(e) { return null; }
}

const renders={dashboard:renderDashboard,pdv:renderPDV,estoque:renderEstoque,precificacao:renderPrecificacao,nfe:renderNFE,financeiro:renderFinanceiro,clientes:renderClientes,relatorios:renderRelatorios,judicial:renderJudicial,pedido_reposicao:renderPedidoReposicao,campanhas:renderCampanhas};
const titulos={dashboard:"Dashboard",pdv:"PDV — Ponto de Venda",estoque:"Controle de Estoque",precificacao:"Precificação Automática",nfe:"Entrada de Nota Fiscal",financeiro:"Financeiro",clientes:"Clientes",relatorios:"Relatórios & IA"};
let tabAtual="dashboard";

function setTab(t){
  tabAtual=t;
  document.querySelectorAll(".nav-btn").forEach(b=>b.className="nav-btn"+(b.dataset.tab===t?" ativo":""));
  document.getElementById("tab-title").textContent=titulos[t];
  document.getElementById("content").innerHTML=renders[t]();
  if(t==="dashboard") initCharts();
}
function renderContent(){document.getElementById("content").innerHTML=renders[tabAtual]();if(tabAtual==="dashboard")initCharts();}
window.setTab=setTab;
// Fase B: usar autenticação
inicializar();
</script>
